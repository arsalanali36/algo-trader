<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Trade Chart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  body{margin:0;background:#0d1117;color:#e6edf3;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  .hdr{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid #21262d}
  .hdr h1{font-size:16px;margin:0;font-weight:600}
  .pill{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid #30363d;background:#161b22}
  .muted{color:#8b949e;font-size:12px}
  #chart{flex:1;height:100%}
  #msg{padding:40px;text-align:center;color:#8b949e;font-size:14px}
  .split-wrap{flex:1;display:flex;overflow:hidden;min-height:0}
  .pane{display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#0d1117}
  .pane-hidden{flex:0 0 0 !important;width:0 !important;overflow:hidden}
  #pane-left{flex:1 1 45%}
  #pane-right{flex:1 1 55%}
  .splitter2{flex:0 0 6px;background:#161b22;border-left:1px solid #30363d;border-right:1px solid #30363d;cursor:col-resize}
  .splitter2:hover{background:#1f6feb}
  .pane-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #21262d;font-size:11px;color:#8b949e;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px}
  .pane-hdr .hint{color:#484f58;text-transform:none;letter-spacing:0}
  #chart-left{flex:1;width:100%;min-height:0}
  #watchlist{width:230px; border-left:1px solid #21262d; background:#161b22; flex-shrink:0; display:flex; flex-direction:column; transition:width .15s ease, min-width .15s ease}
  #watchlist.collapsed{width:0; min-width:0; border-left:none; overflow:hidden}
  #watchlist-title{padding:10px 14px; border-bottom:1px solid #21262d; font-size:11px; text-transform:uppercase; color:#8b949e; font-weight:700; letter-spacing:0.5px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0}
  #wl-toggle{position:absolute; top:50%; right:230px; transform:translateY(-50%); width:18px; height:44px; background:#21262d; border:1px solid #30363d; border-right:none; border-radius:6px 0 0 6px; color:#8b949e; cursor:pointer; font-size:11px; z-index:5; display:flex; align-items:center; justify-content:center; transition:right .15s ease}
  #watchlist.collapsed ~ #wl-toggle{right:0}
</style></head>
<body>
  <div class="hdr">
    <h1 id="sym">Trade Chart</h1>
    <span class="pill" id="side">—</span>
    <span class="muted" id="px">—</span>
    <span class="pill" id="pnl">—</span>
    <span class="muted" id="date" style="margin-left:auto"></span>
  </div>
  <div id="msg" style="display:none"></div>
  <div id="body-row" style="display:flex; height:calc(100vh - 110px); position:relative;">
    <!-- Split chart view: left = instrument/index, right = option premium -->
    <div class="split-wrap" id="split-wrap">
      <div class="pane" id="pane-left">
        <div class="pane-hdr"><span id="left-pane-title">Instrument</span><span class="hint">Alt+Click to expand</span></div>
        <div id="chart-left"><div class="empty muted" style="padding:20px;text-align:center">Loading underlying chart...</div></div>
      </div>
      <div class="splitter2" id="splitter2"></div>
      <div class="pane" id="pane-right">
        <div class="pane-hdr"><span>Premium</span><span class="hint">Alt+Click to expand</span></div>
        <div id="chart"></div>
      </div>
    </div>
    <!-- Watchlist Sidebar (right side, collapsible) -->
    <div id="watchlist">
      <div id="watchlist-title">
        <span>Watchlist</span>
      </div>
      <div id="watchlist-items" style="flex:1; overflow-y:auto;">
        <!-- Populated by JS -->
      </div>
    </div>
    <button id="wl-toggle" title="Toggle watchlist">▶</button>
  </div>
<script>
(function(){
  const q = new URLSearchParams(location.search);
  const sym = q.get('sym')||'', side=(q.get('side')||'').toUpperCase();
  const entry=parseFloat(q.get('entry')||0), exit=parseFloat(q.get('exit')||0);
  const et=q.get('et')||'', xt=q.get('xt')||'', qty=parseFloat(q.get('qty')||0);
  document.getElementById('sym').textContent = sym || 'Trade Chart';
  const sideEl=document.getElementById('side');
  sideEl.textContent = side||'—';
  sideEl.style.color = side==='SELL'?'#f85149':'#3fb950';
  document.getElementById('px').textContent = (entry?entry.toFixed(2):'—')+'  →  '+(exit?exit.toFixed(2):'—')+(et?('   ('+et+' → '+xt+')'):'');
  // P&L: SELL = entry-exit, BUY = exit-entry
  const pts = side==='SELL' ? (entry-exit) : (exit-entry);
  const rs  = qty ? pts*qty : null;
  const pnlEl=document.getElementById('pnl');
  pnlEl.textContent = (pts>=0?'+':'')+pts.toFixed(2)+' pts'+(rs!=null?('  ('+(rs>=0?'+':'')+rs.toFixed(0)+')'):'');
  pnlEl.style.color = pts>=0?'#3fb950':'#f85149';

  function showMsg(t){ document.getElementById('chart').style.display='none'; const m=document.getElementById('msg'); m.style.display='block'; m.textContent=t; }

  const dt=q.get('date')||'';
  const tf=q.get('tf')||'';
  const ind=q.get('ind')||'';
  
  // Calculate SMA
  function calcSMA(data, period) {
    const res = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) continue;
      let sum = 0;
      for (let j = 0; j < period; j++) sum += data[i - j].close;
      res.push({ time: data[i].time, value: sum / period });
    }
    return res;
  }

  // Calculate EMA
  function calcEMA(data, period) {
    const res = [];
    let k = 2 / (period + 1);
    let ema = 0;
    for (let i = 0; i < data.length; i++) {
      if (i === 0) { ema = data[i].close; }
      else { ema = (data[i].close - ema) * k + ema; }
      if (i >= period - 1) {
        res.push({ time: data[i].time, value: ema });
      }
    }
    return res;
  }

  // Calculate VWAP
  function calcVWAP(data) {
    const res = [];
    let cumVol = 0;
    let cumVolPx = 0;
    for (let i = 0; i < data.length; i++) {
      const typicalPx = (data[i].high + data[i].low + data[i].close) / 3;
      const vol = data[i].volume || 1; // fallback to 1 if no vol
      cumVol += vol;
      cumVolPx += typicalPx * vol;
      res.push({ time: data[i].time, value: cumVolPx / cumVol });
    }
    return res;
  }

  // Calculate Bollinger Bands
  function calcBB(data, period, stdDev) {
    const sma = calcSMA(data, period);
    const upper = [], lower = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) continue;
      let s = sma.find(x => x.time === data[i].time);
      if(!s) continue;
      let sumSq = 0;
      for (let j = 0; j < period; j++) {
        sumSq += Math.pow(data[i - j].close - s.value, 2);
      }
      const sd = Math.sqrt(sumSq / period);
      upper.push({ time: data[i].time, value: s.value + (stdDev * sd) });
      lower.push({ time: data[i].time, value: s.value - (stdDev * sd) });
    }
    return { sma, upper, lower };
  }
  
  fetch('/api/trade-chart-data?trad_sym='+encodeURIComponent(sym)+'&et='+et+'&xt='+xt+(dt?('&date='+dt):'')+(tf?('&tf='+tf):''))
    .then(r=>r.json()).then(d=>{
      document.getElementById('date').textContent = d.date||'';
      if(!d.ok){ showMsg(d.msg||'Data nahi mila'); return; }
      if(!d.candles || !d.candles.length){ showMsg('Is din ka intraday data nahi (non-trading day?)'); return; }
      
      // Deduplicate candles and sort
      const uniqueCandles = [];
      const seen = new Set();
      d.candles.forEach(c => {
        if(!seen.has(c.time)){ seen.add(c.time); uniqueCandles.push(c); }
      });
      uniqueCandles.sort((a,b) => a.time - b.time);
      d.candles = uniqueCandles;

      const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout:{ background:{color:'#0d1117'}, textColor:'#8b949e' },
        grid:{ vertLines:{color:'#161b22'}, horzLines:{color:'#161b22'} },
        timeScale:{ timeVisible:true, secondsVisible:false, borderColor:'#30363d' },
        rightPriceScale:{ borderColor:'#30363d' },
        crosshair:{ mode:0 }
      });
      const s = chart.addCandlestickSeries({ upColor:'#3fb950', downColor:'#f85149',
        borderVisible:false, wickUpColor:'#3fb950', wickDownColor:'#f85149' });
      s.setData(d.candles);
      const mk=[];
      const isSell = side==='SELL';
      if(d.entry_mk) {
        mk.push({
          time: d.entry_mk,
          position: isSell?'aboveBar':'belowBar',
          color: isSell?'#f85149':'#3fb950',
          shape: isSell?'arrowDown':'arrowUp',
          text: 'Entry '+side+' ₹'+entry.toFixed(2)
        });
      }
      if(d.exit_mk) {
        mk.push({
          time: d.exit_mk,
          position: isSell?'belowBar':'aboveBar',
          color: isSell?'#3fb950':'#f85149',
          shape: isSell?'arrowUp':'arrowDown',
          text: 'Exit '+(isSell?'BUY':'SELL')+' ₹'+exit.toFixed(2)
        });
      }
      mk.sort((a,b)=>a.time-b.time);
      if(mk.length) s.setMarkers(mk);
      
      // Plot indicators
      if(ind) {
        const indList = ind.split(',').map(x=>x.trim());
        const colors = ['#f9a8d4', '#818cf8', '#fcd34d', '#34d399']; 
        let colorIdx = 0;
        
        indList.forEach(indicator => {
          const typeMatch = indicator.match(/^[a-zA-Z]+/);
          if(!typeMatch) return;
          const type = typeMatch[0].toUpperCase();
          
          if(type === 'EMA' || type === 'SMA') {
            const m = indicator.match(/\d+/);
            if(m) {
              const period = parseInt(m[0]);
              const c = colors[colorIdx % colors.length]; colorIdx++;
              let idata = type === 'SMA' ? calcSMA(d.candles, period) : calcEMA(d.candles, period);
              if(idata.length > 0) {
                const ls = chart.addLineSeries({ color: c, lineWidth: 2, crosshairMarkerVisible: false, title: type+period });
                ls.setData(idata);
              }
            }
          } else if(type === 'VWAP') {
            const idata = calcVWAP(d.candles);
            if(idata.length > 0) {
              const ls = chart.addLineSeries({ color: '#fcd34d', lineWidth: 2, crosshairMarkerVisible: false, title: 'VWAP' });
              ls.setData(idata);
            }
          } else if(type === 'BB') {
            const m = indicator.match(/\d+/g);
            if(m && m.length >= 2) {
              const period = parseInt(m[0]);
              const stdDev = parseFloat(m[1]);
              const res = calcBB(d.candles, period, stdDev);
              if(res.upper.length > 0) {
                chart.addLineSeries({ color: '#818cf8', lineWidth: 1, crosshairMarkerVisible: false, title: 'BB Up' }).setData(res.upper);
                chart.addLineSeries({ color: '#818cf8', lineWidth: 1, crosshairMarkerVisible: false, title: 'BB Low' }).setData(res.lower);
                chart.addLineSeries({ color: '#818cf8', lineWidth: 1, lineStyle: 2, crosshairMarkerVisible: false }).setData(res.sma);
              }
            }
          }
        });
      }
      
      // entry/exit price lines
      if(entry) s.createPriceLine({price:entry, color:'#3fb950', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'Entry'});
      if(exit)  s.createPriceLine({price:exit,  color:'#f85149', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'Exit'});
      // SL / Target lines (item F) — passed as PREMIUM price levels by the
      // caller (₹-amount SL/TP already converted to premium points so they're
      // plottable on this premium axis). Solid so they stand out from the
      // dashed entry/exit lines.
      const _slPx = parseFloat(q.get('sl')||''), _tpPx = parseFloat(q.get('tp')||'');
      if(isFinite(_slPx) && _slPx>0) s.createPriceLine({price:_slPx, color:'#f85149', lineWidth:2, lineStyle:0, axisLabelVisible:true, title:'SL'});
      if(isFinite(_tpPx) && _tpPx>0) s.createPriceLine({price:_tpPx, color:'#3fb950', lineWidth:2, lineStyle:0, axisLabelVisible:true, title:'Target'});
      chart.timeScale().fitContent();
      window.addEventListener('resize', ()=>chart.applyOptions({width:document.getElementById('chart').clientWidth}));
    }).catch(e=>showMsg('Error: '+e.message));
})();

// ── Left pane: underlying instrument/index chart ────────────────────────────
(function(){
  const q = new URLSearchParams(location.search);
  const sym = q.get('sym')||'';
  const dt = q.get('date')||'';
  const et = q.get('et')||'', xt = q.get('xt')||'';
  const strategy = q.get('strategy')||'';
  if (!sym) return;
  const root = sym.split('-')[0];
  document.getElementById('left-pane-title').textContent = root || 'Instrument';

  fetch('/api/trade-chart-underlying-data?trad_sym='+encodeURIComponent(sym)+'&et='+et+'&xt='+xt+(dt?('&date='+dt):'')+(strategy?('&strategy='+encodeURIComponent(strategy)):''))
    .then(r=>r.json()).then(d=>{
      const el = document.getElementById('chart-left');
      if (!d.ok || !d.candles || !d.candles.length){
        el.innerHTML = '<div class="muted" style="padding:20px;text-align:center">'+(d.msg||'Underlying data nahi mila')+'</div>';
        return;
      }
      el.innerHTML = '';
      const BG = '#0d1117';
      // lightweight-charts measures the container's clientWidth/clientHeight
      // AT createChart() call time. This pane sits inside a multi-level flex
      // layout (split-wrap > pane > chart-left) and on first paint the
      // browser sometimes hasn't finished resolving that flex chain's height
      // yet (it has a width but not a height), so the chart silently gets
      // created with height 0 — found 2026-06-29: the candle plot canvas +
      // time-axis never rendered, while the right price-scale's own labels
      // (a separately-sized sub-element) still showed. Explicit width/height
      // here + a deferred re-apply on the next frame is the fix.
      const chart = LightweightCharts.createChart(el, {
        width: el.clientWidth, height: el.clientHeight,
        layout:{ background:{color:BG}, textColor:'#8b949e' },
        grid:{ vertLines:{color:'#161b22'}, horzLines:{color:'#161b22'} },
        timeScale:{ timeVisible:true, secondsVisible:false, borderColor:'#30363d' },
        rightPriceScale:{ borderColor:'#30363d' },
        crosshair:{ mode:0 }
      });

      const uniq = []; const seen = new Set();
      d.candles.forEach(c=>{ if(!seen.has(c.time)){ seen.add(c.time); uniq.push(c); } });
      uniq.sort((a,b)=>a.time-b.time);

      const s = chart.addCandlestickSeries({ upColor:'#3fb950', downColor:'#f85149',
        borderVisible:false, wickUpColor:'#3fb950', wickDownColor:'#f85149' });
      s.setData(uniq);
      if (d.entry_mk) s.setMarkers([{time:d.entry_mk, position:'belowBar', color:'#58a6ff', shape:'circle', text:'Entry'}]);

      // Zone shown as two horizontal price lines (not a filled box) — this
      // pane covers the FULL trading day, so price legitimately trades both
      // above and below the zone. The Watch-chart's box-mask trick (two
      // stacked Area series painting background color below "lower") hides
      // any real candle whose price falls below the zone's lower bound,
      // which happens routinely over a full day — found 2026-06-29 on a
      // MARUTI trade chart where most of the day's candles vanished because
      // they traded below a zone formed mid-session. Price lines never hide
      // candles, so they're the safe choice here.
      const z = d.zone || {};
      if (z.zone_upper != null && z.zone_lower != null) {
        const zoneColor = z.zone_type === 'RED' ? '#f85149' : '#3fb950';
        s.createPriceLine({price: z.zone_upper, color: zoneColor, lineWidth: 1, lineStyle: 2,
          axisLabelVisible: true, title: 'zone upper'});
        s.createPriceLine({price: z.zone_lower, color: zoneColor, lineWidth: 1, lineStyle: 2,
          axisLabelVisible: true, title: 'zone lower'});
      }

      // R1-R5 = red dashed, S1-S5 = green dashed, PDH = red solid, PDL = green
      // solid, PDC = blue solid, P (pivot) = blue dashed — same scheme as the
      // Watchlist chart / user's TradingView setup.
      function _levelStyle(type) {
        if (type === 'PDH') return {color:'#f85149', style:0};
        if (type === 'PDL') return {color:'#3fb950', style:0};
        if (type === 'PDC') return {color:'#1f6feb', style:0};
        if (type === 'P')   return {color:'#1f6feb', style:2};
        if (/^R\d$/.test(type) || type === 'RESISTANCE') return {color:'#f85149', style:2};
        if (/^S\d$/.test(type) || type === 'SUPPORT')    return {color:'#3fb950', style:2};
        return {color:'#8b949e', style:2};
      }
      (z.key_levels || []).forEach(([price, type]) => {
        const st = _levelStyle(type);
        s.createPriceLine({price: price, color:st.color, lineWidth:1, lineStyle:st.style,
          axisLabelVisible:true, title:type});
      });
      if (z.tracked_high != null) {
        s.createPriceLine({price: z.tracked_high, color:'#d29922', lineWidth:2, lineStyle:0,
          axisLabelVisible:true, title:'touch high'});
      }
      if (z.tracked_low != null) {
        s.createPriceLine({price: z.tracked_low, color:'#d29922', lineWidth:2, lineStyle:0,
          axisLabelVisible:true, title:'touch low'});
      }

      chart.timeScale().fitContent();
      window._leftChart = chart;
      // Re-measure on the next two frames — covers the case where the
      // flex layout's height wasn't settled yet at createChart() time.
      requestAnimationFrame(() => {
        chart.applyOptions({width: el.clientWidth, height: el.clientHeight});
        chart.timeScale().fitContent();
        requestAnimationFrame(() => {
          chart.applyOptions({width: el.clientWidth, height: el.clientHeight});
          chart.timeScale().fitContent();
        });
      });
      window.addEventListener('resize', ()=>chart.applyOptions({width: el.clientWidth, height: el.clientHeight}));
    }).catch(()=>{
      document.getElementById('chart-left').innerHTML = '<div class="muted" style="padding:20px;text-align:center">Error loading underlying chart</div>';
    });
})();

// ── Split-view resize (drag splitter) + Ctrl+Click full-width toggle ───────
(function(){
  const wrap = document.getElementById('split-wrap');
  const left = document.getElementById('pane-left');
  const right = document.getElementById('pane-right');
  const splitter = document.getElementById('splitter2');
  let dragging = false;

  splitter.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = wrap.getBoundingClientRect();
    const pct = Math.max(20, Math.min(80, ((e.clientX - rect.left) / rect.width) * 100));
    left.style.flex = `1 1 ${pct}%`;
    right.style.flex = `1 1 ${100 - pct}%`;
    if (window._leftChart) window._leftChart.applyOptions({width: document.getElementById('chart-left').clientWidth});
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  function resizeCharts(){
    if (window._leftChart) window._leftChart.applyOptions({width: document.getElementById('chart-left').clientWidth});
    window.dispatchEvent(new Event('resize'));
  }

  function expandPane(which){
    if (which === 'left'){ right.classList.add('pane-hidden'); left.classList.remove('pane-hidden'); }
    else { left.classList.add('pane-hidden'); right.classList.remove('pane-hidden'); }
    splitter.style.display = 'none';
    setTimeout(resizeCharts, 0);
  }
  function restoreSplit(){
    left.classList.remove('pane-hidden'); right.classList.remove('pane-hidden');
    splitter.style.display = '';
    setTimeout(resizeCharts, 0);
  }

  function isExpanded(){ return right.classList.contains('pane-hidden') || left.classList.contains('pane-hidden'); }
  left.addEventListener('click', e => {
    if (!e.altKey) return;
    if (left.classList.contains('pane-hidden')===false && right.classList.contains('pane-hidden')) restoreSplit();
    else expandPane('left');
  });
  right.addEventListener('click', e => {
    if (!e.altKey) return;
    if (right.classList.contains('pane-hidden')===false && left.classList.contains('pane-hidden')) restoreSplit();
    else expandPane('right');
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && isExpanded()) restoreSplit(); });
})();

// ── Watchlist collapse toggle ───────────────────────────────────────────────
(function(){
  const wl = document.getElementById('watchlist');
  const btn = document.getElementById('wl-toggle');
  if (!wl || !btn) return;
  function resizeCharts(){
    if (window._leftChart) window._leftChart.applyOptions({width: document.getElementById('chart-left').clientWidth});
    window.dispatchEvent(new Event('resize'));
  }
  btn.addEventListener('click', () => {
    const collapsed = wl.classList.toggle('collapsed');
    btn.textContent = collapsed ? '◀' : '▶';
    setTimeout(resizeCharts, 160); // after the CSS width transition
  });
})();

// ── ←/→ navigate between trades (list saved in localStorage by the Orders & P&L tab) ──
(function(){
  const q = new URLSearchParams(location.search);
  const idxStr = q.get('idx');
  let list = [];
  try { list = JSON.parse(localStorage.getItem('chartTradeList') || '[]'); } catch(e) {}
  
  if(idxStr == null || !list.length) {
    const wl = document.getElementById('watchlist');
    const wlBtn = document.getElementById('wl-toggle');
    if (wl) wl.style.display = 'none';
    if (wlBtn) wlBtn.style.display = 'none';
    return; // opened standalone (no list context) — no nav, hide watchlist
  }
  
  const idx = parseInt(idxStr, 10);
  
  // Populate watchlist sidebar
  const wlItems = document.getElementById('watchlist-items');
  const wlTitle = document.getElementById('watchlist-title');
  if (wlTitle) {
    wlTitle.textContent = `Watchlist (${list.length})`;
  }
  
  if (wlItems) {
    list.forEach((t, i) => {
      const item = document.createElement('div');
      item.style.cssText = `
        padding: 10px 14px;
        cursor: pointer;
        border-bottom: 1px solid #21262d;
        font-size: 11.5px;
        transition: all 0.15s ease;
        display: flex;
        flex-direction: column;
        gap: 4px;
      `;
      
      if (i === idx) {
        item.style.background = '#21262d';
        item.style.borderLeft = '3px solid #1f6feb';
        item.style.paddingLeft = '11px';
      } else {
        item.style.borderLeft = '3px solid transparent';
      }
      
      item.addEventListener('mouseover', () => {
        if (i !== idx) item.style.background = '#1b2028';
      });
      item.addEventListener('mouseout', () => {
        if (i !== idx) item.style.background = 'transparent';
      });
      
      item.addEventListener('click', () => goTo(i));
      
      const pts = t.side === 'SELL' ? (t.entry - t.exit) : (t.exit - t.entry);
      const ptsColor = pts >= 0 ? '#3fb950' : '#f85149';
      
      item.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
          <span style="font-weight:600; color:#e6edf3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:140px;" title="${t.sym}">${t.sym}</span>
          <span style="font-size:10px; font-weight:700; color:${t.side==='SELL'?'#f85149':'#3fb950'};">${t.side}</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:10.5px; color:#8b949e;">
          <span>${t.et} → ${t.xt}</span>
          <span style="color:${ptsColor}; font-weight:600;">${pts >= 0 ? '+' : ''}${pts.toFixed(2)}</span>
        </div>
      `;
      wlItems.appendChild(item);
    });
  }

  function goTo(newIdx){
    if(newIdx < 0 || newIdx >= list.length) return;
    const t = list[newIdx];
    const params = {sym:t.sym, side:t.side, entry:t.entry, exit:t.exit, et:t.et, xt:t.xt, qty:t.qty, idx:newIdx};
    if(t.date) params.date = t.date;
    if(t.strategy) params.strategy = t.strategy;
    location.href = '/trade-chart?' + new URLSearchParams(params).toString();
  }

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') goTo(idx - 1);
    else if(e.key === 'ArrowRight') goTo(idx + 1);
  });

  // small on-screen hint so the user knows the shortcut exists
  const hint = document.createElement('span');
  hint.className = 'muted';
  hint.style.marginLeft = '8px';
  hint.textContent = `← / → (${idx+1}/${list.length})`;
  document.querySelector('.hdr').appendChild(hint);
})();
</script>
</body></html>
