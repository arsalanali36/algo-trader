<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Trade Chart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  body{margin:0;background:#0d1117;color:#e6edf3;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  .hdr{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid #21262d}
  .hdr h1{font-size:16px;margin:0;font-weight:600}
  .pill{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid #30363d;background:#161b22}
  .muted{color:#8b949e;font-size:12px}
  #chart{width:100%;height:calc(100vh - 110px)}
  #msg{padding:40px;text-align:center;color:#8b949e;font-size:14px}
</style></head>
<body>
  <div class="hdr">
    <h1 id="sym">Trade Chart</h1>
    <span class="pill" id="side">—</span>
    <span class="muted" id="px">—</span>
    <span class="pill" id="pnl">—</span>
    <span class="muted" id="date" style="margin-left:auto"></span>
  </div>
  <div id="msg" style="display:none"></div>
  <div id="chart"></div>
<script>
(function(){
  const q = new URLSearchParams(location.search);
  const sym = q.get('sym')||'', side=(q.get('side')||'').toUpperCase();
  const entry=parseFloat(q.get('entry')||0), exit=parseFloat(q.get('exit')||0);
  const et=q.get('et')||'', xt=q.get('xt')||'', qty=parseFloat(q.get('qty')||0);
  document.getElementById('sym').textContent = sym || 'Trade Chart';
  const sideEl=document.getElementById('side');
  sideEl.textContent = side||'—';
  sideEl.style.color = side==='SELL'?'#f85149':'#3fb950';
  document.getElementById('px').textContent = (entry?('₹'+entry.toFixed(2)):'—')+'  →  '+(exit?('₹'+exit.toFixed(2)):'—')+(et?('   ('+et+' → '+xt+')'):'');
  // P&L: SELL = entry-exit, BUY = exit-entry
  const pts = side==='SELL' ? (entry-exit) : (exit-entry);
  const rs  = qty ? pts*qty : null;
  const pnlEl=document.getElementById('pnl');
  pnlEl.textContent = (pts>=0?'+':'')+pts.toFixed(2)+' pts'+(rs!=null?('  ('+(rs>=0?'+':'')+'₹'+rs.toFixed(0)+')'):'');
  pnlEl.style.color = pts>=0?'#3fb950':'#f85149';

  function showMsg(t){ document.getElementById('chart').style.display='none'; const m=document.getElementById('msg'); m.style.display='block'; m.textContent=t; }

  const dt=q.get('date')||'';
  const tf=q.get('tf')||'';
  const ind=q.get('ind')||'';
  
  // Calculate SMA
  function calcSMA(data, period) {
    const res = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) continue;
      let sum = 0;
      for (let j = 0; j < period; j++) sum += data[i - j].close;
      res.push({ time: data[i].time, value: sum / period });
    }
    return res;
  }

  // Calculate EMA
  function calcEMA(data, period) {
    const res = [];
    let k = 2 / (period + 1);
    let ema = 0;
    for (let i = 0; i < data.length; i++) {
      if (i === 0) { ema = data[i].close; }
      else { ema = (data[i].close - ema) * k + ema; }
      if (i >= period - 1) {
        res.push({ time: data[i].time, value: ema });
      }
    }
    return res;
  }

  // Calculate VWAP
  function calcVWAP(data) {
    const res = [];
    let cumVol = 0;
    let cumVolPx = 0;
    for (let i = 0; i < data.length; i++) {
      const typicalPx = (data[i].high + data[i].low + data[i].close) / 3;
      const vol = data[i].volume || 1; // fallback to 1 if no vol
      cumVol += vol;
      cumVolPx += typicalPx * vol;
      res.push({ time: data[i].time, value: cumVolPx / cumVol });
    }
    return res;
  }

  // Calculate Bollinger Bands
  function calcBB(data, period, stdDev) {
    const sma = calcSMA(data, period);
    const upper = [], lower = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) continue;
      let s = sma.find(x => x.time === data[i].time);
      if(!s) continue;
      let sumSq = 0;
      for (let j = 0; j < period; j++) {
        sumSq += Math.pow(data[i - j].close - s.value, 2);
      }
      const sd = Math.sqrt(sumSq / period);
      upper.push({ time: data[i].time, value: s.value + (stdDev * sd) });
      lower.push({ time: data[i].time, value: s.value - (stdDev * sd) });
    }
    return { sma, upper, lower };
  }
  
  fetch('/api/trade-chart-data?trad_sym='+encodeURIComponent(sym)+'&et='+et+'&xt='+xt+(dt?('&date='+dt):'')+(tf?('&tf='+tf):''))
    .then(r=>r.json()).then(d=>{
      document.getElementById('date').textContent = d.date||'';
      if(!d.ok){ showMsg(d.msg||'Data nahi mila'); return; }
      if(!d.candles || !d.candles.length){ showMsg('Is din ka intraday data nahi (non-trading day?)'); return; }
      
      // Deduplicate candles and sort
      const uniqueCandles = [];
      const seen = new Set();
      d.candles.forEach(c => {
        if(!seen.has(c.time)){ seen.add(c.time); uniqueCandles.push(c); }
      });
      uniqueCandles.sort((a,b) => a.time - b.time);
      d.candles = uniqueCandles;

      const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout:{ background:{color:'#0d1117'}, textColor:'#8b949e' },
        grid:{ vertLines:{color:'#161b22'}, horzLines:{color:'#161b22'} },
        timeScale:{ timeVisible:true, secondsVisible:false, borderColor:'#30363d' },
        rightPriceScale:{ borderColor:'#30363d' },
        crosshair:{ mode:0 }
      });
      const s = chart.addCandlestickSeries({ upColor:'#3fb950', downColor:'#f85149',
        borderVisible:false, wickUpColor:'#3fb950', wickDownColor:'#f85149' });
      s.setData(d.candles);
      const mk=[];
      if(d.entry_mk) mk.push({time:d.entry_mk, position:'belowBar', color:'#3fb950', shape:'arrowUp',   text:'Entry '+side+' ₹'+entry.toFixed(2)});
      if(d.exit_mk)  mk.push({time:d.exit_mk,  position:'aboveBar', color:'#f85149', shape:'arrowDown', text:'Exit ₹'+exit.toFixed(2)});
      mk.sort((a,b)=>a.time-b.time);
      if(mk.length) s.setMarkers(mk);
      
      // Plot indicators
      if(ind) {
        const indList = ind.split(',').map(x=>x.trim());
        const colors = ['#f9a8d4', '#818cf8', '#fcd34d', '#34d399']; 
        let colorIdx = 0;
        
        indList.forEach(indicator => {
          const typeMatch = indicator.match(/^[a-zA-Z]+/);
          if(!typeMatch) return;
          const type = typeMatch[0].toUpperCase();
          
          if(type === 'EMA' || type === 'SMA') {
            const m = indicator.match(/\d+/);
            if(m) {
              const period = parseInt(m[0]);
              const c = colors[colorIdx % colors.length]; colorIdx++;
              let idata = type === 'SMA' ? calcSMA(d.candles, period) : calcEMA(d.candles, period);
              if(idata.length > 0) {
                const ls = chart.addLineSeries({ color: c, lineWidth: 2, crosshairMarkerVisible: false, title: type+period });
                ls.setData(idata);
              }
            }
          } else if(type === 'VWAP') {
            const idata = calcVWAP(d.candles);
            if(idata.length > 0) {
              const ls = chart.addLineSeries({ color: '#fcd34d', lineWidth: 2, crosshairMarkerVisible: false, title: 'VWAP' });
              ls.setData(idata);
            }
          } else if(type === 'BB') {
            const m = indicator.match(/\d+/g);
            if(m && m.length >= 2) {
              const period = parseInt(m[0]);
              const stdDev = parseFloat(m[1]);
              const res = calcBB(d.candles, period, stdDev);
              if(res.upper.length > 0) {
                chart.addLineSeries({ color: '#818cf8', lineWidth: 1, crosshairMarkerVisible: false, title: 'BB Up' }).setData(res.upper);
                chart.addLineSeries({ color: '#818cf8', lineWidth: 1, crosshairMarkerVisible: false, title: 'BB Low' }).setData(res.lower);
                chart.addLineSeries({ color: '#818cf8', lineWidth: 1, lineStyle: 2, crosshairMarkerVisible: false }).setData(res.sma);
              }
            }
          }
        });
      }
      
      // entry/exit price lines
      if(entry) s.createPriceLine({price:entry, color:'#3fb950', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'Entry'});
      if(exit)  s.createPriceLine({price:exit,  color:'#f85149', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'Exit'});
      chart.timeScale().fitContent();
      window.addEventListener('resize', ()=>chart.applyOptions({width:document.getElementById('chart').clientWidth}));
    }).catch(e=>showMsg('Error: '+e.message));
})();
</script>
</body></html>
