<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Backtest Chart — Full View</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column}
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hdr h1{font-size:15px;font-weight:600}
.stats{display:flex;gap:16px;font-size:12px;color:#8b949e;flex-wrap:wrap}
.stats b{color:#e6edf3}
.legend{display:flex;gap:14px;margin-left:auto;font-size:11px;color:#8b949e;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
#chart{flex:1;width:100%}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:#8b949e;font-size:14px}
</style>
</head>
<body>
  <div class="hdr">
    <h1>📊 Backtest — Python vs Pine</h1>
    <div class="stats" id="stats"></div>
    <div class="legend">
      <span><i class="dot" style="background:#1f6feb"></i>PY entry</span>
      <span><i class="dot" style="background:#58a6ff"></i>PY exit</span>
      <span><i class="dot" style="background:#d29922"></i>TV entry</span>
      <span><i class="dot" style="background:#f0883e"></i>TV exit</span>
    </div>
  </div>
  <div id="chart"><div class="empty">No chart data — open this from the Backtest panel's "🔍 Full View" button.</div></div>

<script>
function render() {
  const raw = localStorage.getItem('bt_chart_data');
  if (!raw) return;
  const d = JSON.parse(raw);
  const s = d.summary || {};
  let statsHtml = `
    <div>Trades: <b>${s.n_trades ?? '-'}</b></div>
    <div>Wins: <b style="color:#3fb950">${s.wins ?? '-'}</b></div>
    <div>Losses: <b style="color:#f85149">${s.losses ?? '-'}</b></div>
    <div>PnL: <b style="color:${(s.pnl_points||0) >= 0 ? '#3fb950' : '#f85149'}">${s.pnl_points ?? '-'} pts</b></div>`;
  if (d.accuracy) {
    statsHtml += `<div>Pine match: <b style="color:#d29922">${d.accuracy.matched}/${d.accuracy.total_tv} (${d.accuracy.pct}%)</b></div>`;
  }
  document.getElementById('stats').innerHTML = statsHtml;

  const container = document.getElementById('chart');
  if (!d.candles || d.candles.length === 0) {
    container.innerHTML = '<div class="empty">No candle data</div>';
    return;
  }
  container.innerHTML = '';
  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth, height: container.clientHeight,
    layout: { background: { color: '#0d1117' }, textColor: '#8b949e' },
    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    timeScale: { timeVisible: true, secondsVisible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
  });
  const series = chart.addCandlestickSeries({ upColor: '#3fb950', downColor: '#f85149', borderVisible: false, wickUpColor: '#3fb950', wickDownColor: '#f85149' });
  series.setData(d.candles);

  const markers = [];
  (d.trades || []).forEach(t => {
    markers.push({ time: t.entry_time, position: t.side === 'Long' ? 'belowBar' : 'aboveBar',
                   color: '#1f6feb', shape: t.side === 'Long' ? 'arrowUp' : 'arrowDown',
                   text: 'PY ' + t.side + ' @' + t.entry_price });
    if (t.exit_time) {
      markers.push({ time: t.exit_time, position: t.side === 'Long' ? 'aboveBar' : 'belowBar',
                     color: '#58a6ff', shape: t.side === 'Long' ? 'arrowDown' : 'arrowUp',
                     text: 'PY exit @' + t.exit_price });
    }
  });
  (d.tv_trades || []).forEach(t => {
    markers.push({ time: t.entry_time, position: t.side === 'Long' ? 'belowBar' : 'aboveBar',
                   color: '#d29922', shape: t.side === 'Long' ? 'arrowUp' : 'arrowDown',
                   text: 'TV ' + t.side + ' @' + t.entry_price });
    if (t.exit_time) {
      markers.push({ time: t.exit_time, position: t.side === 'Long' ? 'aboveBar' : 'belowBar',
                     color: '#f0883e', shape: t.side === 'Long' ? 'arrowDown' : 'arrowUp',
                     text: 'TV exit @' + t.exit_price });
    }
  });
  series.setMarkers(markers.sort((a, b) => a.time - b.time));
  chart.timeScale().fitContent();
  window.addEventListener('resize', () => chart.resize(container.clientWidth, container.clientHeight));
}
render();
</script>
</body>
</html>
