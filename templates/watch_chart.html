<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Watch Chart</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  html,body{margin:0;height:100%;background:#0d1117;color:#e6edf3;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  .hdr{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid #21262d}
  .hdr h1{font-size:16px;margin:0;font-weight:600}
  .pill{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid #30363d;background:#161b22}
  .muted{color:#8b949e;font-size:12px}
  #chart{height:calc(100vh - 56px);width:100%}
  #msg{padding:40px;text-align:center;color:#8b949e;font-size:14px}
</style></head>
<body>
  <div class="hdr">
    <h1 id="sym">Watch Chart</h1>
    <span class="pill" id="zone-pill">—</span>
    <span class="muted" id="range-txt"></span>
    <span class="muted" id="touch-txt"></span>
    <span class="muted" id="updated" style="margin-left:auto"></span>
  </div>
  <div id="msg" style="display:none"></div>
  <div id="chart"></div>
<script>
(function(){
  const q = new URLSearchParams(location.search);
  const symbol = q.get('symbol') || '';
  const strategy = q.get('strategy') || '';
  document.getElementById('sym').textContent = symbol || 'Watch Chart';

  function showMsg(t){ document.getElementById('chart').style.display='none'; const m=document.getElementById('msg'); m.style.display='block'; m.textContent=t; }

  async function load(){
    try{
      const r = await fetch(`/api/watch-chart-data?symbol=${encodeURIComponent(symbol)}&strategy=${encodeURIComponent(strategy)}`);
      const d = await r.json();
      if(!d.ok){ showMsg(d.msg || 'Chart data fetch failed'); return; }
      if(!d.candles || !d.candles.length){ showMsg('No candle data yet for ' + symbol); return; }

      const z = d.zone || {};
      const pill = document.getElementById('zone-pill');
      pill.textContent = z.zone_type || 'no zone';
      pill.style.color = z.zone_type === 'GREEN' ? '#3fb950' : (z.zone_type === 'RED' ? '#f85149' : '#8b949e');
      document.getElementById('range-txt').textContent = (z.zone_lower!=null && z.zone_upper!=null)
        ? `Range: ${Number(z.zone_lower).toFixed(1)} - ${Number(z.zone_upper).toFixed(1)} (${z.zone_fresh?'fresh':'stale'})` : '';
      document.getElementById('touch-txt').textContent = z.touch_active ? `Touching ${z.active_touch_type||''}` : '';
      document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

      const BG = '#0d1117';
      const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout:{background:{color:BG}, textColor:'#8b949e'},
        grid:{vertLines:{color:'#161b22'}, horzLines:{color:'#161b22'}},
        timeScale:{timeVisible:true, secondsVisible:false},
        rightPriceScale:{borderColor:'#30363d'},
      });

      // Zone boxes (rectangles), one per zone formed today — TradingView's
      // Ars_Auto_Rev_Chain draws each zone as a filled box confined to its
      // own bar range, not a chart-wide line. lightweight-charts v4 has no
      // native rectangle primitive, so each box is faked with TWO Area
      // series sharing the same [start_ts, end_ts] x-range: one fills
      // everything below "upper" with the zone color, the other (added
      // right after, so it paints on top) re-fills everything below
      // "lower" with the exact chart background color — net effect is a
      // band confined between lower and upper. The candlestick series is
      // added LAST (after all zone boxes) so candles always render on top
      // and are never hidden by the background-color mask.
      const zones = (z.zones_history && z.zones_history.length) ? z.zones_history
        : (z.zone_upper != null && z.zone_lower != null ? [{
            start_ts: z.zone_start_ts != null ? z.zone_start_ts : d.candles[0].time,
            end_ts: d.candles[d.candles.length - 1].time,
            upper: z.zone_upper, lower: z.zone_lower, type: z.zone_type,
          }] : []);
      zones.forEach(zone => {
        if (zone.upper == null || zone.lower == null) return;
        const isRed = zone.type === 'RED';
        const zoneColor = isRed ? '#f85149' : '#3fb950';
        const fillColor = isRed ? 'rgba(248,81,73,0.22)' : 'rgba(63,185,80,0.22)';
        const band = chart.addAreaSeries({
          topColor: fillColor, bottomColor: fillColor, lineColor: zoneColor, lineWidth: 1,
          priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
        });
        band.setData([{time: zone.start_ts, value: zone.upper}, {time: zone.end_ts, value: zone.upper}]);
        const mask = chart.addAreaSeries({
          topColor: BG, bottomColor: BG, lineColor: 'rgba(0,0,0,0)', lineWidth: 0,
          priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
        });
        mask.setData([{time: zone.start_ts, value: zone.lower}, {time: zone.end_ts, value: zone.lower}]);
      });

      const series = chart.addCandlestickSeries({
        upColor:'#3fb950', downColor:'#f85149', borderVisible:false,
        wickUpColor:'#3fb950', wickDownColor:'#f85149',
      });
      series.setData(d.candles);

      if (z.zone_upper != null) {
        series.createPriceLine({price: z.zone_upper, color: z.zone_type==='RED'?'#f85149':'#3fb950',
          lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'zone upper'});
      }
      if (z.zone_lower != null) {
        series.createPriceLine({price: z.zone_lower, color: z.zone_type==='RED'?'#f85149':'#3fb950',
          lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'zone lower'});
      }
      if (z.ltp != null) {
        series.createPriceLine({price: z.ltp, color:'#58a6ff', lineWidth:1, lineStyle:3,
          axisLabelVisible:true, title:'LTP'});
      }
      if (z.tracked_high != null) {
        series.createPriceLine({price: z.tracked_high, color:'#d29922', lineWidth:2, lineStyle:0,
          axisLabelVisible:true, title:'touch high'});
      }
      if (z.tracked_low != null) {
        series.createPriceLine({price: z.tracked_low, color:'#d29922', lineWidth:2, lineStyle:0,
          axisLabelVisible:true, title:'touch low'});
      }
      // R1-R5 = red dashed, S1-S5 = green dashed, PDH = red solid, PDL = green
      // solid, PDC = blue solid, P (pivot) = blue dashed. Generic RESISTANCE/
      // SUPPORT (the high/low chain levels, which don't map to a specific
      // pivot number) fall into the same red/green-dashed buckets.
      function _levelStyle(type) {
        if (type === 'PDH') return {color:'#f85149', style:0};
        if (type === 'PDL') return {color:'#3fb950', style:0};
        if (type === 'PDC') return {color:'#1f6feb', style:0};
        if (type === 'P')   return {color:'#1f6feb', style:2};
        if (/^R\d$/.test(type) || type === 'RESISTANCE') return {color:'#f85149', style:2};
        if (/^S\d$/.test(type) || type === 'SUPPORT')    return {color:'#3fb950', style:2};
        return {color:'#8b949e', style:2};
      }
      (z.key_levels || []).forEach(([price, type]) => {
        const st = _levelStyle(type);
        series.createPriceLine({price: price, color:st.color, lineWidth:1, lineStyle:st.style,
          axisLabelVisible:true, title:type});
      });
      chart.timeScale().fitContent();
      window.addEventListener('resize', () => chart.applyOptions({width: document.getElementById('chart').clientWidth}));
    }catch(e){
      showMsg('Error: ' + e);
    }
  }
  load();
  setInterval(load, 15000);
})();
</script>
</body></html>
