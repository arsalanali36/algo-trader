<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Algo Trader</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;font-size:14px}

/* ── Header ── */
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:14px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:16px;font-weight:600}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
#clock{color:#8b949e;font-size:13px}
.dot{width:9px;height:9px;border-radius:50%;background:#f85149;display:inline-block;flex-shrink:0}
.dot.on{background:#3fb950;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Tabs ── */
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 20px; overflow-x:auto;}
.tab{padding:12px 18px;cursor:pointer;color:#8b949e;font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:.15s; white-space:nowrap;}
.tab:hover{color:#e6edf3}
.tab.active{color:#e6edf3;border-bottom-color:#1f6feb}
.tab-body{display:none;padding:20px}
.tab-body.active{display:block}

/* ── Cards / Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.card h2{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* ── Stat rows ── */
.stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #21262d}
.stat:last-child{border-bottom:none}
.stat-label{color:#8b949e}
.stat-value{font-weight:600}
.green{color:#3fb950}.red{color:#f85149}.yellow{color:#d29922}.blue{color:#58a6ff}

/* ── Buttons ── */
.btn{padding:9px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-green{background:#238636;color:#fff}
.btn-blue{background:#1f6feb;color:#fff}
.btn-red{background:#da3633;color:#fff}
.btn-gray{background:#21262d;color:#e6edf3;border:1px solid #30363d}
.btn-amber{background:#9e6a03;color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── Strategy card ── */
.strat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.strat-card.ema{border-color:#1f6feb}
.strat-card.rsi{border-color:#d29922}
.strat-card.range{border-color:#3fb950}
.strat-title{font-size:15px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.strat-mode{font-size:12px;color:#8b949e;margin-bottom:14px}

/* ── Log box ── */
.log-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 12px;height:500px;overflow-y:auto;font-family:monospace;font-size:12.5px;line-height:1.7}
.log-box div{padding:1px 4px;border-radius:3px;margin-bottom:1px}
.lb-info{color:#e6edf3}
.lb-err{color:#f85149;background:#2d0f0f}
.lb-warn{color:#d29922}
.lb-buy{color:#3fb950;font-weight:600}
.lb-sell{color:#f85149;font-weight:600}
.lb-dim{color:#484f58}
.lb{color:#8b949e}
.lb-buy{color:#3fb950}
.lb-sell{color:#f85149}
.lb-err{color:#d29922}
.lb-scan{color:#388bfd}

/* ── Table / Grid Config ── */
.cfg-table {width:100%; border-collapse:collapse; font-size:13px; table-layout: fixed;}
.cfg-table th, .cfg-table td {border:1px solid #30363d; padding:8px; text-align:left; vertical-align:top; width: 200px;}
.cfg-table th:first-child, .cfg-table td:first-child {width: 150px; background:#161b22; font-weight:600;}
.cfg-table select, .cfg-table input {width:100%; background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:5px; border-radius:4px;}
.cfg-table-container {overflow-x:auto; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:10px;}

.tag{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.tag-w{background:#1a4731;color:#3fb950}
.tag-l{background:#3d1f1f;color:#f85149}
#flash{font-size:13px;color:#8b949e;min-height:20px;padding:6px 0}

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; }
.modal { background:#161b22; border:1px solid #30363d; border-radius:8px; width:450px; max-width:90%; max-height:80vh; display:flex; flex-direction:column; }
.modal-hdr { padding:14px 18px; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:15px; }
.modal-body { padding:14px 18px; overflow-y:auto; flex:1; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.modal-ftr { padding:14px 18px; border-top:1px solid #30363d; display:flex; justify-content:flex-end; gap:10px; }
.symbol-cb { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:#e6edf3; }
.symbol-cb input { cursor:pointer; }
.pill-container { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; padding-bottom:8px; }
.pill { background:#21262d; border:1px solid #30363d; border-radius:12px; padding:3px 10px; font-size:11px; color:#8b949e; display:flex; align-items:center; gap:6px; }
.pill .remove { cursor:pointer; color:#f85149; font-weight:bold; }
</style>
</head>
<body>

<div class="hdr">
  <span class="dot" id="hdr-dot"></span>
  <h1>Algo Trader</h1>
  <span id="hdr-badge" style="font-size:12px;color:#8b949e">—</span>
  <div class="hdr-right">
    <a href="/backtest" target="_blank" class="btn btn-gray" style="padding:6px 12px;text-decoration:none;">&#128200; Backtest</a>
    <span id="clock"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('control')">Control</div>
  <div class="tab" onclick="switchTab('pnl')">P&amp;L</div>
  <div class="tab" onclick="switchTab('log')">Logs</div>
  <div class="tab" onclick="switchTab('config')">Config</div>
  <div class="tab" onclick="switchTab('pine')">📌 Pine</div>
</div>

<!-- CONTROL TAB -->
<div class="tab-body active" id="tab-control">
  <div class="card" style="margin-bottom:16px;border-color:#d29922">
    <h2 style="color:#d29922">Dhan Token</h2>
    <div style="display:flex;gap:10px;align-items:flex-start;margin-top:4px">
      <textarea id="token-input" placeholder="JWT token..." style="width:100%;height:60px;background:#0d1117;color:#e6edf3;padding:8px;border:1px solid #30363d;"></textarea>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-amber" onclick="saveToken()">Save</button>
        <button class="btn btn-gray"  onclick="checkToken()">Check</button>
      </div>
    </div>
    <div id="token-msg" style="font-size:12px;margin-top:6px;color:#8b949e"></div>
  </div>
  <div id="control-grid" class="grid" style="margin-bottom:12px"></div>
  <div class="btn-row">
    <button class="btn btn-gray" onclick="saveSummary()">💾 Save Today's Summary</button>
  </div>
  <div id="flash"></div>
</div>

<!-- P&L TAB -->
<div class="tab-body" id="tab-pnl" style="padding:16px">
  <!-- Summary row -->
  <div id="pnl-summary-row" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap"></div>
  <!-- Open Positions full width -->
  <div id="pnl-positions-section" style="margin-bottom:16px"></div>
  <!-- Completed Trades full width -->
  <div id="pnl-orders-section"></div>
</div>

<!-- LOG TAB -->
<div class="tab-body" id="tab-log">
  <div id="log-grid" class="grid" style="grid-template-columns:1fr"></div>
</div>

<!-- CONFIG TAB -->
<div class="tab-body" id="tab-config">
  <div class="tabs" style="margin-bottom:14px; background:transparent; padding:0;" id="cfg-tabs">
    <div class="tab active" onclick="switchCfgTab('ema')" style="font-size:12px;">EMA</div>
    <div class="tab" onclick="switchCfgTab('rsi')" style="font-size:12px;">RSI</div>
    <div class="tab" onclick="switchCfgTab('range')" style="font-size:12px;">Range</div>
  </div>
  
  <div id="cfg-content"></div>
</div>

<!-- PINE TAB -->
<div class="tab-body" id="tab-pine" style="padding:20px;max-width:900px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="margin:0;font-size:16px">Pine Script Version Manager</h2>
    <div id="pine-latest-badge" style="font-size:12px;background:#161b22;border:1px solid #30363d;padding:6px 12px;border-radius:6px;color:#8b949e">loading...</div>
  </div>

  <textarea id="pine-code" placeholder="Yahan apni poori Pine script paste karo..." style="width:100%;height:300px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:12px;font-family:monospace;font-size:12px;resize:vertical;box-sizing:border-box"></textarea>

  <textarea id="pine-desc" placeholder="Notes / kya badla is version mein... (optional)" style="width:100%;height:60px;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:10px;font-size:13px;resize:vertical;box-sizing:border-box;margin-top:8px"></textarea>

  <div style="display:flex;gap:10px;margin-top:10px;align-items:center">
    <button class="btn btn-blue" onclick="pineSave()">💾 Save Version</button>
    <div id="pine-save-msg" style="font-size:13px;color:#3fb950"></div>
  </div>

  <div style="margin-top:24px">
    <h3 style="font-size:13px;color:#8b949e;margin-bottom:10px">Version History</h3>
    <div style="overflow-x:auto">
      <table id="pine-history-table" style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:1px solid #30363d">
            <th onclick="pineSortBy('version')"  style="padding:8px 10px;color:#8b949e;font-weight:600;text-align:left;cursor:pointer;white-space:nowrap;user-select:none">Ver <span id="sort-ind-version"></span></th>
            <th style="padding:8px 10px;color:#8b949e;font-weight:600;text-align:left;white-space:nowrap">Python File</th>
            <th onclick="pineSortBy('timestamp')" style="padding:8px 10px;color:#8b949e;font-weight:600;text-align:left;cursor:pointer;white-space:nowrap;user-select:none">Date/Time <span id="sort-ind-timestamp"></span></th>
            <th style="padding:8px 10px;color:#8b949e;font-weight:600;text-align:left;min-width:200px">Description</th>
            <th onclick="pineSortBy('accuracy')" style="padding:8px 10px;color:#8b949e;font-weight:600;text-align:center;cursor:pointer;white-space:nowrap;user-select:none">Accu% <span id="sort-ind-accuracy"></span></th>
            <th style="padding:8px 10px;color:#8b949e;font-weight:600;text-align:center">Report</th>
          </tr>
        </thead>
        <tbody id="pine-history"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL FOR SYMBOLS -->
<div class="modal-overlay" id="symbol-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span id="modal-title">Select Symbols</span>
      <span style="cursor:pointer;color:#8b949e" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-cbs"></div>
    <div class="modal-ftr">
      <button class="btn btn-gray" onclick="selectAllSymbols(true)">All</button>
      <button class="btn btn-gray" onclick="selectAllSymbols(false)">Clear</button>
      <button class="btn btn-blue" onclick="confirmSymbols()">Done</button>
    </div>
  </div>
</div>

<script>
const NIFTY50 = ["NIFTY","BANKNIFTY","RELIANCE","TCS","INFY","HDFCBANK","ICICIBANK","SBIN","AXISBANK","BAJFINANCE","WIPRO","KOTAKBANK","LT","TATAMOTORS","MARUTI","HINDUNILVR","ITC","ADANIENT","SUNPHARMA","TITAN","ULTRACEMCO","NESTLEIND","POWERGRID","NTPC","ONGC"];

let GLOBAL_CONFIG = {};
let RUNNING_PIDS = {};
let activeTab = 'control';
let activeCfgTab = 'ema';
let currentModalTarget = null; // store the config key (e.g. ema_v1) being edited

function flash(msg, color='#3fb950') {
  const f = document.getElementById('flash');
  f.style.color = color; f.innerText = msg;
  setTimeout(()=>f.innerText='', 3000);
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(e => e.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  activeTab = id;
  if (id === 'pine') { pineLoadLatest(); pineLoadHistory(); }
}

function switchCfgTab(type) {
  document.querySelectorAll('#cfg-tabs .tab').forEach(e => e.classList.remove('active'));
  document.querySelector(`#cfg-tabs .tab[onclick="switchCfgTab('${type}')"]`).classList.add('active');
  activeCfgTab = type;
  renderConfigTable();
}

// ── DATA FETCHING ──
async function loadAll() {
  await fetchConfig();
  await checkStatus();
  renderControlTab();
  renderPnlTab();
  renderLogTab();
  renderConfigTable();
  loadTokenStatus();
  if(activeTab === 'pnl') updatePnl();
  if(activeTab === 'log') updateLogs();
}

async function fetchConfig() {
  const r = await fetch('/api/config');
  GLOBAL_CONFIG = await r.json();
}

async function checkStatus() {
  const r = await fetch('/api/status');
  const d = await r.json();
  RUNNING_PIDS = d;
  document.getElementById('hdr-dot').className = Object.keys(d).length > 0 ? "dot on" : "dot";
}

// ── DYNAMIC RENDERING ──

function getStratColor(type) {
  if(type==='ema') return '#1f6feb';
  if(type==='rsi') return '#d29922';
  if(type==='range') return '#3fb950';
  return '#8b949e';
}

// CONTROL TAB
function renderControlTab() {
  const container = document.getElementById('control-grid');
  let html = '';
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    const pid = RUNNING_PIDS[key];
    const mode = pid ? `Running (PID ${pid})` : 'Stopped';
    html += `
      <div class="strat-card" style="border-color:${color}">
        <div class="strat-title">
          <span class="dot ${pid?'on':''}"></span>
          <span style="color:${color}">${key.toUpperCase()}</span>
        </div>
        <div class="strat-mode">${mode}</div>
        <div class="btn-row">
          <button class="btn btn-green" onclick="startBot('${key}','paper')">▶ Paper</button>
          <button class="btn btn-blue" onclick="startBot('${key}','live')">💰 Live</button>
          <button class="btn btn-red" onclick="stopBot('${key}')">⏹ Stop</button>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// P&L TAB
function renderPnlTab() {
  // Summary pills rendered dynamically in updatePnl — nothing to init here
}

// LOG TAB
const _logPaused = {};
function renderLogTab() {
  const container = document.getElementById('log-grid');
  let html = '';
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    html += `
      <div class="card" style="border-color:${color}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <h2 style="color:${color};margin:0">${key.toUpperCase()} LOG</h2>
          <button id="${key}-pause-btn" onclick="toggleLogPause('${key}')"
            style="padding:4px 12px;background:#21262d;border:1px solid #30363d;border-radius:5px;color:#e6edf3;font-size:12px;cursor:pointer">
            ⏸ Pause
          </button>
        </div>
        <div class="log-box" id="${key}-log">Loading...</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function toggleLogPause(key) {
  _logPaused[key] = !_logPaused[key];
  const btn = document.getElementById(`${key}-pause-btn`);
  if(_logPaused[key]) {
    btn.textContent = '▶ Play';
    btn.style.color = '#3fb950';
    btn.style.borderColor = '#3fb950';
  } else {
    btn.textContent = '⏸ Pause';
    btn.style.color = '#e6edf3';
    btn.style.borderColor = '#30363d';
    // scroll to bottom when resuming
    const box = document.getElementById(`${key}-log`);
    if(box) box.scrollTop = box.scrollHeight;
  }
}

// ── CONFIG TAB DYNAMIC GRID ──

const DEFAULT_CONFIGS = {
  ema: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "1m", qty: 1, active: true
  },
  rsi: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "5m",
    period: 14, oversold: 30, overbought: 70, qty: 1, max_trades_per_symbol: 2, active: true
  },
  range: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "1m",
    max_candle_size: 25, qty: 1, max_trades_per_symbol: 2,
    hawa_me_zone: false, fresh_zone_only: true, zone_exit: false, atr_exit: true, fib_exit: false, active: true
  }
};

const STRAT_FIELDS = {
  ema: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ],
  rsi: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'period', label: 'RSI Period', type: 'number'},
    {id: 'oversold', label: 'Oversold', type: 'number'},
    {id: 'overbought', label: 'Overbought', type: 'number'},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'max_trades_per_symbol', label: 'Max Trades/Symbol', type: 'number'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ],
  range: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'max_candle_size', label: 'Max Candle Size (pts)', type: 'number'},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'max_trades_per_symbol', label: 'Max Trades/Symbol', type: 'number'},
    {id: 'hawa_me_zone', label: 'Hawa Me Zone', type: 'checkbox'},
    {id: 'fresh_zone_only', label: 'Use Fresh Zone Only', type: 'checkbox'},
    {id: 'zone_exit', label: 'Zone Exit', type: 'checkbox'},
    {id: 'atr_exit', label: 'ATR Exit', type: 'checkbox'},
    {id: 'fib_exit', label: 'Fib Exit', type: 'checkbox'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ]
};

function renderConfigTable() {
  const container = document.getElementById('cfg-content');
  const type = activeCfgTab;
  const fields = STRAT_FIELDS[type];
  
  // Find variants of this type
  let variants = Object.keys(GLOBAL_CONFIG).filter(k => k.startsWith(type + '_'));
  if (variants.length === 0) {
    container.innerHTML = `<div style="color:#8b949e;padding:24px;text-align:center">No ${type.toUpperCase()} variation yet. Click "+ Add" to create one.</div><div style="padding:8px"><button class="btn btn-gray" onclick="addVariant('${type}')">+ Add ${type.toUpperCase()} Variation</button></div>`;
    return;
  }

  let html = `<div class="cfg-table-container"><table class="cfg-table">`;
  
  // Headers
  html += `<tr><th>Attributes</th>`;
  variants.forEach(v => {
    html += `<th>${v.toUpperCase()}</th>`;
  });
  html += `<th><button class="btn btn-gray" onclick="addVariant('${type}')">+ Add</button></th></tr>`;
  
  // Rows for each field
  fields.forEach(f => {
    html += `<tr><td>${f.label}</td>`;
    variants.forEach(v => {
      const val = GLOBAL_CONFIG[v][f.id] ?? '';
      
      if(f.type === 'symbols') {
        let symStr = (Array.isArray(val) ? val : []).join(', ') || 'None';
        html += `<td>
          <button class="btn btn-gray" style="font-size:11px;padding:3px 6px;margin-bottom:4px" onclick="openSymbolModal('${v}')">✏️ Select</button>
          <div style="font-size:11px;color:#8b949e;word-wrap:break-word;">${symStr}</div>
        </td>`;
      } 
      else if(f.type === 'select') {
        html += `<td><select id="cfg-${v}-${f.id}">`;
        f.opts.forEach(opt => {
          let selected = String(val) === String(opt) ? 'selected' : '';
          html += `<option value="${opt}" ${selected}>${opt}</option>`;
        });
        html += `</select></td>`;
      } 
      else if(f.type === 'number') {
        html += `<td><input type="number" id="cfg-${v}-${f.id}" value="${val}"></td>`;
      }
      else if(f.type === 'checkbox') {
        let chk = val ? 'checked' : '';
        html += `<td><input type="checkbox" id="cfg-${v}-${f.id}" ${chk}></td>`;
      }
    });
    html += `<td></td></tr>`;
  });

  // Action Row
  html += `<tr><td>Actions</td>`;
  variants.forEach(v => {
    html += `<td>

        <button class="btn btn-red" style="padding:5px;" onclick="deleteVariant('${v}')">🗑 Delete</button>
      </div>

  });

function addVariant(type) {
  let keys = Object.keys(GLOBAL_CONFIG).filter(k => k.startsWith(type + '_v'));
  let vNums = keys.map(k => parseInt(k.replace(type+'_v', '')) || 0);
  let nextV = (vNums.length ? Math.max(...vNums) : 0) + 1;
  
  let newCfg = JSON.parse(JSON.stringify(DEFAULT_CONFIGS[type]));
  if (keys.length > 0) {
    let baseKey = `${type}_v1`;
    if(!GLOBAL_CONFIG[baseKey]) baseKey = keys[0];
    newCfg = JSON.parse(JSON.stringify(GLOBAL_CONFIG[baseKey]));
  }
  
  GLOBAL_CONFIG[`${type}_v${nextV}`] = newCfg;
  renderConfigTable();
}

function deleteVariant(vKey) {
  if(confirm(`Are you sure you want to delete ${vKey.toUpperCase()}?`)) {
    delete GLOBAL_CONFIG[vKey];
    fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(GLOBAL_CONFIG)
    }).then(() => {
      flash(`${vKey} deleted!`);
      loadAll();
    });
  }
}

function saveVariant(vKey) {
  const type = vKey.split('_')[0];
  const fields = STRAT_FIELDS[type];
  
  fields.forEach(f => {
    if(f.type !== 'symbols') {
      let el = document.getElementById(`cfg-${vKey}-${f.id}`);
      if(el) {
        let val = el.value;
        if(f.type === 'number') val = Number(val);
        else if (f.type === 'checkbox') val = el.checked;
        if(val === 'true') val = true;
        if(val === 'false') val = false;
        GLOBAL_CONFIG[vKey][f.id] = val;
      }
    }
  });

  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(GLOBAL_CONFIG)
  }).then(async (r) => {
    let res = await r.json();
    flash(res.msg);
    loadAll();
  });
}

function _card(title, color, content) {
  return `<div style="background:#161b22;border:1px solid ${color}40;border-radius:8px;overflow:hidden;margin-bottom:16px">
    <div style="background:${color}15;padding:8px 14px;font-size:12px;font-weight:700;color:${color};border-bottom:1px solid ${color}30">${title}</div>
    <div>${content}</div>
  </div>`;
}
const _pnlTH = (t,a) => `<th style="padding:7px 12px;color:#8b949e;font-size:11px;font-weight:600;border-bottom:1px solid #30363d;text-align:${a||'left'};white-space:nowrap">${t}</th>`;
const _pnlTD = (t,c,a,x) => `<td style="padding:7px 12px;font-size:12px;color:${c||'#e6edf3'};text-align:${a||'left'};${x||''}">${t}</td>`;
function _pnlTable(cols, rows) {
  let h=`<table style="width:100%;border-collapse:collapse"><thead><tr>${cols.map(c=>_pnlTH(c.l,c.a)).join('')}</tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr style="border-bottom:1px solid #21262d">${r}</tr>`;});
  return h+'</tbody></table>';
}
function _pnlColor(v){return v==null?'#8b949e':v>=0?'#3fb950':'#f85149';}
function _fmt(v){if(v==null||isNaN(v))return'—';return(v>=0?'+':'')+'₹'+Math.abs(v).toFixed(2);}

async function updatePnl() {
  if (activeTab !== 'pnl') return;

  // Fetch all strategies
  const keys = Object.keys(GLOBAL_CONFIG);
  let allResults = {};
  for(let key of keys) {
    try { let r=await fetch(`/api/pnl?s=${key}`); allResults[key]=await r.json(); }
    catch(e){ allResults[key]={trades:0,wins:0,losses:0,total_pnl:0,details:[],open:[]}; }
  }

  // SUMMARY PILLS
  let summaryEl = document.getElementById('pnl-summary-row');
  if(summaryEl) {
    let totalPnl=0,totalTrades=0,totalWins=0,totalLoss=0;
    keys.forEach(k=>{let j=allResults[k];totalPnl+=j.total_pnl||0;totalTrades+=j.trades||0;totalWins+=j.wins||0;totalLoss+=j.losses||0;});
    let sh = keys.map(key=>{
      let j=allResults[key],color=getStratColor(key.split('_')[0]);
      let pc=(j.total_pnl||0)>=0?'#3fb950':'#f85149';
      return `<div style="background:#161b22;border:1px solid ${color}50;border-radius:8px;padding:10px 16px;min-width:150px">
        <div style="color:${color};font-size:11px;font-weight:700;margin-bottom:6px">${key.toUpperCase()}</div>
        <div style="font-size:20px;font-weight:700;color:${pc}">${(j.total_pnl||0)>=0?'+':''}₹${(j.total_pnl||0).toFixed(2)}</div>
        <div style="color:#8b949e;font-size:11px;margin-top:4px">${j.trades||0} trades · ${j.wins||0}W ${j.losses||0}L</div>
      </div>`;
    }).join('');
    if(keys.length>1){
      let tc=totalPnl>=0?'#3fb950':'#f85149';
      sh+=`<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 16px;min-width:150px">
        <div style="color:#8b949e;font-size:11px;font-weight:700;margin-bottom:6px">TOTAL</div>
        <div style="font-size:20px;font-weight:700;color:${tc}">${totalPnl>=0?'+':''}₹${totalPnl.toFixed(2)}</div>
        <div style="color:#8b949e;font-size:11px;margin-top:4px">${totalTrades} trades · ${totalWins}W ${totalLoss}L</div>
      </div>`;
    }
    summaryEl.innerHTML = sh;
  }

  // OPEN POSITIONS
  let allOpen = [];
  keys.forEach(k=>{(allResults[k].open||[]).forEach(p=>allOpen.push({...p,_strat:k}));});
  let posEl = document.getElementById('pnl-positions-section');
  if(posEl) {
    if(!allOpen.length) { posEl.innerHTML=''; }
    else {
      let ltpMap = {};
      try {
        let sl=[...new Set(allOpen.map(d=>d.sym))].map(encodeURIComponent).join(',');
        let lr=await fetch('/api/positions-ltp?syms='+sl);
        let lj=await lr.json();
        if(lj.ok) ltpMap=lj.ltp_map||{};
      } catch(e){}
      let cols=[{l:'Symbol'},{l:'Side',a:'center'},{l:'Entry Time',a:'center'},{l:'Exit Time',a:'center'},{l:'Entry ₹',a:'right'},{l:'LTP',a:'right'},{l:'Points',a:'right'},{l:'Qty',a:'center'},{l:'Unrealized',a:'right'},{l:'',a:'center'}];
      let rows=allOpen.map(d=>{
        let entry=d.entry_price||0, ld=ltpMap[d.sym]||null;
        let ltp=ld?.ltp??null, qty=d.qty||65;
        let pts=ltp!=null?(d.entry==='BUY'?ltp-entry:entry-ltp):null;
        let unrl=(pts!=null&&d.qty)?pts*d.qty:null;
        let sc=d.entry==='BUY'?'#3fb950':'#f85149';
        let closeSide=d.entry==='BUY'?'SELL':'BUY';
        let cbc=d.entry==='BUY'?'#f85149':'#3fb950';
        let modeNow=(window.qoGetMode&&window.qoGetMode())||'paper';
        let bId=`xb_${d.sym.replace(/[^a-z0-9]/gi,'_')}`;
        return _pnlTD(`<b>${d.sym}</b>`)+
               _pnlTD(`<span style="color:${sc};font-weight:700">${d.entry}</span>`,'','center')+
               _pnlTD(d.entry_time||'—','#e6edf3','center')+
               _pnlTD('<span style="color:#8b949e">open</span>','','center')+
               _pnlTD(entry?'₹'+entry.toFixed(2):'—','#e6edf3','right')+
               _pnlTD(ltp!=null?'₹'+ltp.toFixed(2):'⏳','#e6edf3','right')+
               _pnlTD(pts!=null?(pts>=0?'+':'')+pts.toFixed(1):'—',_pnlColor(pts),'right','font-weight:700')+
               _pnlTD(qty,'#8b949e','center')+
               _pnlTD(unrl!=null?_fmt(unrl):'—',_pnlColor(unrl),'right','font-weight:700')+
               `<td style="padding:5px 10px;text-align:center">
                 <button id="${bId}" onclick="closePosition('${d.sym}','${d.entry}',${d.qty||65},'${modeNow}','${bId}')"

                   ${closeSide} ✕

      });
      posEl.innerHTML=_card(`⏳ OPEN POSITIONS (${allOpen.length})`,'#d29922',_pnlTable(cols,rows));
    }
  }

  // COMPLETED TRADES
  let ordEl = document.getElementById('pnl-orders-section');
  if(!ordEl) return;
  let allDetails=[];
  keys.forEach(k=>{(allResults[k].details||[]).forEach(d=>allDetails.push({...d,_strat:k}));});
  allDetails.sort((a,b)=>(b.entry_time||'').localeCompare(a.entry_time||''));
  if(!allDetails.length){
    ordEl.innerHTML=`<div style="color:#484f58;padding:16px;text-align:center;font-size:13px">Aaj koi completed trade nahi</div>`;
    return;
  }
  let oCols=[{l:'Symbol'},{l:'Side',a:'center'},{l:'Entry Time',a:'center'},{l:'Entry ₹',a:'right'},{l:'Exit Time',a:'center'},{l:'Exit ₹',a:'right'},{l:'Qty',a:'center'},{l:'P&L',a:'right'}];
  let oRows=allDetails.map(d=>{
    let pnl=d.pnl??0,sc=d.entry==='BUY'?'#3fb950':'#f85149';
    return _pnlTD(`<b>${d.sym}</b>`)+
           _pnlTD(`<span style="color:${sc};font-weight:700">${d.entry}</span>`,'','center')+
           _pnlTD(d.entry_time||'—','#8b949e','center')+
           _pnlTD(d.entry_price!=null?'₹'+d.entry_price.toFixed(2):'—','','right')+
           _pnlTD(d.exit_time||'—','#8b949e','center')+
           _pnlTD(d.exit_price!=null?'₹'+d.exit_price.toFixed(2):'—','','right')+
           _pnlTD(d.qty||'—','#8b949e','center')+
           _pnlTD(_fmt(pnl),_pnlColor(pnl),'right','font-weight:700');
  });
  ordEl.innerHTML=_card(`✅ COMPLETED TRADES (${allDetails.length})`,'#3fb950',_pnlTable(oCols,oRows));

}

function formatLogLine(L) {
  L = L.replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // [CONFIG] line → split into 3 readable rows
  if(L.includes('[CONFIG]')) {
    const ts = L.match(/^[\d\-]+ [\d:,]+/)?.[0] || '';
    const rest = L.replace(/^.*\[CONFIG\]\s*/, '');
    const parts = rest.split(' | ');
    // Group: line1 = TF/Instrument/Qty/MaxTrades, line2 = Entry, line3 = Exit
    const cfg   = parts.filter(p => !p.startsWith('Entry') && !p.startsWith('Exit'));
    const entry = parts.find(p => p.startsWith('Entry')) || '';
    const exit_ = parts.find(p => p.startsWith('Exit'))  || '';
    return `
      <div class="lb-dim" style="border-top:1px solid #21262d;margin-top:4px;padding-top:4px">
        <span style="color:#8b949e">${ts}</span>
        <span style="color:#58a6ff;font-weight:bold"> [CONFIG]</span>
        ${cfg.map(p=>`<span style="color:#d29922"> ${p}</span>`).join(' <span style="color:#30363d">|</span>')}
      </div>
      <div class="lb-dim" style="padding-left:16px">
        <span style="color:#3fb950">&#x2192; ENTRY:</span>
        <span style="color:#c9d1d9"> ${entry.replace('Entry: ','')}</span>
      </div>
      <div class="lb-dim" style="padding-left:16px;border-bottom:1px solid #21262d;padding-bottom:4px;margin-bottom:4px">
        <span style="color:#f85149">&#x2192; EXIT:</span>
        <span style="color:#c9d1d9"> ${exit_.replace('Exit: ','')}</span>
      </div>`;
  }

  let cls = 'lb-info';
  if(/ERROR|error|Traceback|ModuleNot|TypeError/.test(L)) cls = 'lb-err';
  else if(/WARNING|warning|Skipping stale|Failed|fail/.test(L))  cls = 'lb-warn';
  else if(/\[PAPER\].*BUY|SIGNAL.*BUY/.test(L))                  cls = 'lb-buy';
  else if(/\[PAPER\].*SELL|SIGNAL.*SELL|EXIT/.test(L))           cls = 'lb-sell';
  else if(/levels loaded|sleeping|Loop done/.test(L))             cls = 'lb-dim';
  return `<div class="${cls}">${L}</div>`;
}

async function updateLogs() {
  if (activeTab !== 'log') return;
  for(let key of Object.keys(GLOBAL_CONFIG)) {
    if(_logPaused[key]) continue;   // paused — don't update
    try {
      let r = await fetch(`/api/log?s=${key}`);
      let j = await r.json();
      let lines = (j.lines || []).slice(-120);
      let html = lines.map(formatLogLine).join('');
      let box = document.getElementById(`${key}-log`);
      if(box){ box.innerHTML = html || '<div class="lb-dim">No logs yet.</div>'; box.scrollTop = box.scrollHeight; }
    } catch(e){}
  }
}

    padding:'14px', fontFamily:'monospace', zIndex:'9999',
    boxShadow:'0 4px 24px rgba(0,0,0,0.6)', userSelect:'none'
  });
  document.body.appendChild(panel);

  // drag
  const hdr = document.getElementById('qo-header');
  let dragging=false, dx=0, dy=0;
  hdr.addEventListener('mousedown', e=>{
    dragging=true;
    const r=panel.getBoundingClientRect();
    dx=e.clientX-r.left; dy=e.clientY-r.top;
    panel.style.right='auto';
    panel.style.bottom='auto';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    panel.style.left=(e.clientX-dx)+'px';
    panel.style.top=(e.clientY-dy)+'px';
  });
  document.addEventListener('mouseup', ()=>dragging=false);
  document.getElementById('qo-close').onclick = ()=>{ clearInterval(_qoAutoRefresh); panel.remove(); };

  // First fetch on open + auto-refresh every 30s
  qoFetchLtp();
  let _qoAutoRefresh = setInterval(qoFetchLtp, 3000);

  window.qoGetMode = ()=>qoMode;

  window.qoSetMode = m=>{
    qoMode=m;
    document.getElementById('qo-paper').style.background = m==='paper'?'#d29922':'transparent';
    document.getElementById('qo-paper').style.color      = m==='paper'?'#0d1117':'#8b949e';
    document.getElementById('qo-live').style.background  = m==='live'?'#f85149':'transparent';
    document.getElementById('qo-live').style.color       = m==='live'?'#fff':'#8b949e';
    document.getElementById('qo-status').textContent = m==='live'?'Mode: LIVE — Real orders!':'Mode: PAPER';
    document.getElementById('qo-status').style.color = m==='live'?'#f85149':'#8b949e';
  };

  let _qoLtpTimer = null;
  async function qoFetchLtp() {
    document.getElementById('qo-pe-ltp').textContent = '⏳';
    document.getElementById('qo-ce-ltp').textContent = '⏳';
    try {
      const r = await fetch(`/api/option-ltp?symbol=${qoSym}&offset=${qoAtm}`);
      const j = await r.json();
      if (j.ok) {
        window._qoPeLtp = j.pe_ltp; window._qoCeLtp = j.ce_ltp;
        document.getElementById('qo-pe-ltp').textContent = j.pe_ltp != null ? '₹' + j.pe_ltp.toFixed(2) : '—';
        document.getElementById('qo-ce-ltp').textContent = j.ce_ltp != null ? '₹' + j.ce_ltp.toFixed(2) : '—';
        document.getElementById('qo-pe-sym').textContent = (j.pe_sym||'').replace(qoSym+'-','');
        document.getElementById('qo-ce-sym').textContent = (j.ce_sym||'').replace(qoSym+'-','');
      } else {
        document.getElementById('qo-pe-ltp').textContent = j.msg || 'Error';
        document.getElementById('qo-ce-ltp').textContent = '';
      }
    } catch(e) {
      document.getElementById('qo-pe-ltp').textContent = 'JS Error: ' + e.message;
    }
  }
  function qoRefreshLtp() {
    clearTimeout(_qoLtpTimer);
    _qoLtpTimer = setTimeout(qoFetchLtp, 300);
  }

  window.qoSetSym = s=>{
    qoSym=s;
    ['NIFTY','BANKNIFTY'].forEach(sym=>{
      const b=document.getElementById('qo-sym-'+sym);
      const sel=sym===s;
      b.style.borderColor = sel?'#1f6feb':'#30363d';
      b.style.background  = sel?'#1f6feb22':'#21262d';
      b.style.color       = sel?'#58a6ff':'#8b949e';
    });
    updateQtyHint();
    qoRefreshLtp();
  };

  window.qoSetAtm = v=>{
    qoAtm=v;
    document.querySelectorAll('#qo-atm-row button').forEach(b=>{
      const bv=parseInt(b.dataset.atm);
      b.style.background = bv===v?'#1f6feb':'#21262d';
      b.style.borderColor= bv===v?'#1f6feb':'#30363d';
      b.style.color      = bv===v?'#fff':'#8b949e';
    });
    qoRefreshLtp();
  };

  window.updateQtyHint = ()=>{
    const ls = LOT_SIZES[qoSym]||65;
    const lots = parseInt(document.getElementById('qo-lots')?.value)||1;
    const el = document.getElementById('qo-qty-num');
    const ls2= document.getElementById('qo-ls');
    if(el) el.textContent = lots*ls;
    if(ls2) ls2.textContent = ls;
  };

  window.qoUsePrice = leg=>{
    const v = leg==='pe' ? window._qoPeLtp : window._qoCeLtp;
    if (v != null) document.getElementById('qo-price').value = v.toFixed(2);
  };

  window.qoOrder = async side=>{
    const lots = parseInt(document.getElementById('qo-lots').value)||1;
    const st = document.getElementById('qo-status');
    // blank price → auto: use displayed LTP of relevant leg (BUY=PE, SELL=CE)
    let priceRaw = document.getElementById('qo-price').value.trim();
    let price = priceRaw==='' ? (side==='BUY'?window._qoPeLtp:window._qoCeLtp) : parseFloat(priceRaw);
    if (price==null || isNaN(price) || price<=0){ st.textContent='Price nahi mila — LTP load hone do'; st.style.color='#f85149'; return; }
    st.textContent = `LIMIT ${side} @ ₹${price.toFixed(2)}...`; st.style.color='#d29922';
    try {
      const r = await fetch('/api/manual-order',{method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({symbol:qoSym, side, lots, strike_offset:qoAtm, mode:qoMode, order_type:'LIMIT', price})});
      const j = await r.json();
      st.textContent = j.msg || (j.ok?'Done':'Error');
      st.style.color = j.ok?'#3fb950':'#f85149';
    } catch(e){ st.textContent='Network error'; st.style.color='#f85149'; }
  };
})();

async function closePosition(tSym, entrySide, qty, mode, btnId) {
  const btn = document.getElementById(btnId);
  if(btn) { btn.disabled=true; btn.textContent='...'; }
  const modeNow = (window.qoGetMode && window.qoGetMode()) || mode || 'paper';
  try {
    let r = await fetch('/api/close-position', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({t_sym:tSym, entry_side:entrySide, qty:qty, mode:modeNow})
    });
    let j = await r.json();
    if(j.ok) {
      flash('✅ ' + j.msg, '#3fb950');
      setTimeout(updatePnl, 800);
    } else {
      flash('❌ ' + j.msg, '#f85149');
      if(btn) { btn.disabled=false; btn.textContent=entrySide==='BUY'?'SELL ✕':'BUY ✕'; }
    }
  } catch(e) {
    flash('❌ Network error', '#f85149');
    if(btn) { btn.disabled=false; btn.textContent='ERR'; }
  }
}

// ── PINE VERSION MANAGER ──────────────────────────────────────
async function pineLoadLatest() {
  const r = await fetch('/api/pine/latest');
  const d = await r.json();
  const badge = document.getElementById('pine-latest-badge');
  if (d.version === 0) {
    badge.innerHTML = 'Koi version nahi — pehli script paste karo';
  } else {
    badge.innerHTML = `<span style="color:#3fb950">v${d.version}</span> &nbsp;|&nbsp; <span style="color:#e6edf3">${d.name}</span> &nbsp;|&nbsp; <span style="color:#8b949e">${d.timestamp}</span>`;
  }
}

let _pineData = [];
let _pineSortKey = 'version';
let _pineSortAsc = false;

async function pineLoadHistory() {
  const r = await fetch('/api/pine/history');
  _pineData = await r.json();
  pineRenderTable();
}

function pineSortBy(key) {
  if (_pineSortKey === key) _pineSortAsc = !_pineSortAsc;
  else { _pineSortKey = key; _pineSortAsc = false; }
  pineRenderTable();
}

function pineRenderTable() {
  const el = document.getElementById('pine-history');
  if (!_pineData.length) { el.innerHTML = '<tr><td colspan="6" style="padding:16px;color:#8b949e;text-align:center">Abhi koi version saved nahi hai</td></tr>'; return; }

  // update sort indicators
  ['version','name','timestamp','accuracy'].forEach(k => {
    const el = document.getElementById('sort-ind-' + k);
    if (el) el.textContent = _pineSortKey === k ? (_pineSortAsc ? '↑' : '↓') : '';
  });

  const sorted = [..._pineData].sort((a, b) => {
    let av = a[_pineSortKey] ?? '', bv = b[_pineSortKey] ?? '';
    if (_pineSortKey === 'accuracy') { av = av || -1; bv = bv || -1; }
    const res = av < bv ? -1 : av > bv ? 1 : 0;
    return _pineSortAsc ? res : -res;
  });

  // group by strategy name (preserve sort order within groups if sorting by name/version)
  const groups = [];
  const seen = {};
  sorted.forEach(v => {
    if (!seen[v.name]) { seen[v.name] = []; groups.push({ name: v.name, items: seen[v.name] }); }
    seen[v.name].push(v);
  });

  el.innerHTML = groups.map(g => {
    const headerRow = `<tr><td colspan="6" style="padding:10px 10px 4px;color:#8b949e;font-size:11px;font-weight:600;letter-spacing:0.5px;border-bottom:1px solid #30363d;border-top:2px solid #30363d;background:#161b2288">${g.name}</td></tr>`;
    const rows = g.items.map(v => {
    const acc = v.accuracy != null ? v.accuracy : null;
    const accColor = acc >= 85 ? '#3fb950' : acc >= 60 ? '#d29922' : acc != null ? '#f85149' : '#8b949e';
    const accCell = acc != null ? `<span style="color:${accColor};font-weight:700">${acc}%</span>` : `<span style="color:#8b949e">—</span>`;
    const pyFile = v.py_file && v.py_file !== 'none' ? v.py_file : null;
    const pyBadge = pyFile ? `<span style="background:#1f6feb22;color:#1f6feb;font-size:10px;padding:1px 6px;border-radius:3px;font-family:monospace">${pyFile}</span>` : `<span style="background:#30363d33;color:#8b949e;font-size:10px;padding:1px 6px;border-radius:3px">not converted</span>`;
    const reportCell = v.report_stats
      ? `<a href="/pine/report/${v.version}" target="_blank" style="color:#58a6ff;font-size:12px;text-decoration:none;white-space:nowrap">📊 Report<br><span style="font-size:10px;color:#8b949e">${v.report_stats.tv_trades}TV / ${v.report_stats.eng_trades}Eng</span></a>`
      : `<span style="color:#30363d;font-size:12px">—</span>`;
    const sv = v.strat_version || v.version;
    return `<tr style="border-bottom:1px solid #21262d" onmouseover="this.style.background='#161b22'" onmouseout="this.style.background='transparent'">
      <td style="padding:10px;color:#3fb950;font-weight:700;white-space:nowrap">v${sv}</td>
      <td style="padding:10px">${pyBadge}</td>
      <td style="padding:10px;color:#8b949e;font-size:12px;white-space:nowrap">${v.timestamp}</td>
      <td style="padding:10px;min-width:200px">
        <div id="pine-view-${v.version}" style="display:flex;align-items:flex-start;gap:6px;cursor:default">
          <span style="color:${v.desc ? '#e6edf3' : '#8b949e'};font-size:12px;flex:1;line-height:1.5">${v.desc || 'Add notes...'}</span>
          <span onclick="pineEditStart(${v.version})" title="Edit" style="color:#8b949e;font-size:13px;cursor:pointer;flex-shrink:0;padding:1px 3px;border-radius:3px" onmouseover="this.style.color='#e6edf3'" onmouseout="this.style.color='#8b949e'">✏️</span>
        </div>
        <div id="pine-edit-${v.version}" style="display:none">
          <textarea id="pine-desc-${v.version}" style="width:100%;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:5px 7px;font-size:12px;resize:vertical;min-height:50px;font-family:inherit;box-sizing:border-box">${v.desc || ''}</textarea>
          <div style="display:flex;gap:6px;margin-top:4px">
            <button onclick="pineDescSave(${v.version})" style="background:#1f6feb33;border:1px solid #1f6feb55;color:#58a6ff;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer">💾 Save</button>
            <button onclick="pineEditCancel(${v.version})" style="background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer">✕</button>
          </div>
        </div>
      </td>
      <td style="padding:10px;text-align:center">${accCell}</td>
      <td style="padding:10px;text-align:center">${reportCell}</td>
    </tr>`;
    }).join('');
    return headerRow + rows;
  }).join('');
}

async function pineSave() {
  const code = document.getElementById('pine-code').value.trim();
  if (!code) { document.getElementById('pine-save-msg').textContent = '⚠️ Kuch paste karo pehle'; return; }
  const msg = document.getElementById('pine-save-msg');
  msg.style.color = '#8b949e'; msg.textContent = 'Saving...';
  const desc = document.getElementById('pine-desc').value.trim();
  const r = await fetch('/api/pine/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({code, desc}) });
  const d = await r.json();
  msg.style.color = '#3fb950';
  msg.textContent = `✅ v${d.version} saved — "${d.name}"`;
  document.getElementById('pine-code').value = '';
  document.getElementById('pine-desc').value = '';
  setTimeout(() => msg.textContent = '', 4000);
  pineLoadLatest();
  pineLoadHistory();
}

function pineEditStart(version) {
  document.getElementById('pine-view-' + version).style.display = 'none';
  document.getElementById('pine-edit-' + version).style.display = 'block';
  document.getElementById('pine-desc-' + version).focus();
}

function pineEditCancel(version) {
  document.getElementById('pine-edit-' + version).style.display = 'none';
  document.getElementById('pine-view-' + version).style.display = 'flex';
}

async function pineDescSave(version) {
  const desc = document.getElementById('pine-desc-' + version).value.trim();
  await fetch('/api/pine/desc', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({version, desc}) });
  // update view inline without full reload
  const viewEl = document.getElementById('pine-view-' + version);
  viewEl.querySelector('span:first-child').textContent = desc || 'Add notes...';
  viewEl.querySelector('span:first-child').style.color = desc ? '#e6edf3' : '#8b949e';
  pineEditCancel(version);
  flash('✅ Saved');
}

// init
pineLoadLatest();
</script>
