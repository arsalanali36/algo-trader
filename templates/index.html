<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Algo Trader</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;font-size:14px}

/* ── Header ── */
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:14px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:16px;font-weight:600}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
#clock{color:#8b949e;font-size:13px}
.dot{width:9px;height:9px;border-radius:50%;background:#f85149;display:inline-block;flex-shrink:0}
.dot.on{background:#3fb950;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Tabs ── */
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 20px; overflow-x:auto;}
.tab{padding:12px 18px;cursor:pointer;color:#8b949e;font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:.15s; white-space:nowrap;}
.tab:hover{color:#e6edf3}
.tab.active{color:#e6edf3;border-bottom-color:#1f6feb}
.tab-body{display:none;padding:20px}
.tab-body.active{display:block}

/* ── Cards / Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.card h2{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* ── Stat rows ── */
.stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #21262d}
.stat:last-child{border-bottom:none}
.stat-label{color:#8b949e}
.stat-value{font-weight:600}
.green{color:#3fb950}.red{color:#f85149}.yellow{color:#d29922}.blue{color:#58a6ff}

/* ── Buttons ── */
.btn{padding:9px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-green{background:#238636;color:#fff}
.btn-blue{background:#1f6feb;color:#fff}
.btn-red{background:#da3633;color:#fff}
.btn-gray{background:#21262d;color:#e6edf3;border:1px solid #30363d}
.btn-amber{background:#9e6a03;color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── Strategy card ── */
.strat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.strat-card.ema{border-color:#1f6feb}
.strat-card.rsi{border-color:#d29922}
.strat-card.range{border-color:#3fb950}
.strat-title{font-size:15px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.strat-mode{font-size:12px;color:#8b949e;margin-bottom:14px}

/* ── Log box ── */
.log-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 12px;height:500px;overflow-y:auto;font-family:monospace;font-size:12.5px;line-height:1.7}
.log-box div{padding:1px 4px;border-radius:3px;margin-bottom:1px}
.lb-info{color:#e6edf3}
.lb-err{color:#f85149;background:#2d0f0f}
.lb-warn{color:#d29922}
.lb-buy{color:#3fb950;font-weight:600}
.lb-sell{color:#f85149;font-weight:600}
.lb-dim{color:#484f58}
.lb{color:#8b949e}
.lb-buy{color:#3fb950}
.lb-sell{color:#f85149}
.lb-err{color:#d29922}
.lb-scan{color:#388bfd}

/* ── Table / Grid Config ── */
.cfg-table {width:100%; border-collapse:collapse; font-size:13px; table-layout: fixed;}
.cfg-table th, .cfg-table td {border:1px solid #30363d; padding:8px; text-align:left; vertical-align:top; width: 200px;}
.cfg-table th:first-child, .cfg-table td:first-child {width: 150px; background:#161b22; font-weight:600;}
.cfg-table select, .cfg-table input {width:100%; background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:5px; border-radius:4px;}
.cfg-table-container {overflow-x:auto; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:10px;}

.tag{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.tag-w{background:#1a4731;color:#3fb950}
.tag-l{background:#3d1f1f;color:#f85149}
#flash{font-size:13px;color:#8b949e;min-height:20px;padding:6px 0}

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; }
.modal { background:#161b22; border:1px solid #30363d; border-radius:8px; width:450px; max-width:90%; max-height:80vh; display:flex; flex-direction:column; }
.modal-hdr { padding:14px 18px; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:15px; }
.modal-body { padding:14px 18px; overflow-y:auto; flex:1; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.modal-ftr { padding:14px 18px; border-top:1px solid #30363d; display:flex; justify-content:flex-end; gap:10px; }
.symbol-cb { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:#e6edf3; }
.symbol-cb input { cursor:pointer; }
.pill-container { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; padding-bottom:8px; }
.pill { background:#21262d; border:1px solid #30363d; border-radius:12px; padding:3px 10px; font-size:11px; color:#8b949e; display:flex; align-items:center; gap:6px; }
.pill .remove { cursor:pointer; color:#f85149; font-weight:bold; }
</style>
</head>
<body>

<div class="hdr">
  <span class="dot" id="hdr-dot"></span>
  <h1>Algo Trader</h1>
  <span id="hdr-badge" style="font-size:12px;color:#8b949e">—</span>
  <div class="hdr-right">
    <a href="/backtest" target="_blank" class="btn btn-gray" style="padding:6px 12px;text-decoration:none;">&#128200; Backtest</a>
    <span id="clock"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('control')">Control</div>
  <div class="tab" onclick="switchTab('pnl')">P&amp;L</div>
  <div class="tab" onclick="switchTab('log')">Logs</div>
  <div class="tab" onclick="switchTab('config')">Config</div>
</div>

<!-- CONTROL TAB -->
<div class="tab-body active" id="tab-control">
  <div class="card" style="margin-bottom:16px;border-color:#d29922">
    <h2 style="color:#d29922">Dhan Token</h2>
    <div style="display:flex;gap:10px;align-items:flex-start;margin-top:4px">
      <textarea id="token-input" placeholder="JWT token..." style="width:100%;height:60px;background:#0d1117;color:#e6edf3;padding:8px;border:1px solid #30363d;"></textarea>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-amber" onclick="saveToken()">Save</button>
        <button class="btn btn-gray"  onclick="checkToken()">Check</button>
      </div>
    </div>
    <div id="token-msg" style="font-size:12px;margin-top:6px;color:#8b949e"></div>
  </div>
  <div id="control-grid" class="grid" style="margin-bottom:12px"></div>
  <div class="btn-row">
    <button class="btn btn-gray" onclick="saveSummary()">💾 Save Today's Summary</button>
  </div>
  <div id="flash"></div>
</div>

<!-- P&L TAB -->
<div class="tab-body" id="tab-pnl">
  <div id="pnl-stats-grid" class="grid" style="margin-bottom:16px"></div>
  <div id="pnl-trades-grid" class="grid"></div>
</div>

<!-- LOG TAB -->
<div class="tab-body" id="tab-log">
  <div id="log-grid" class="grid" style="grid-template-columns:1fr"></div>
</div>

<!-- CONFIG TAB -->
<div class="tab-body" id="tab-config">
  <div class="tabs" style="margin-bottom:14px; background:transparent; padding:0;" id="cfg-tabs">
    <div class="tab active" onclick="switchCfgTab('ema')" style="font-size:12px;">EMA</div>
    <div class="tab" onclick="switchCfgTab('rsi')" style="font-size:12px;">RSI</div>
    <div class="tab" onclick="switchCfgTab('range')" style="font-size:12px;">Range</div>
  </div>
  
  <div id="cfg-content"></div>
</div>

<!-- MODAL FOR SYMBOLS -->
<div class="modal-overlay" id="symbol-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span id="modal-title">Select Symbols</span>
      <span style="cursor:pointer;color:#8b949e" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-cbs"></div>
    <div class="modal-ftr">
      <button class="btn btn-gray" onclick="selectAllSymbols(true)">All</button>
      <button class="btn btn-gray" onclick="selectAllSymbols(false)">Clear</button>
      <button class="btn btn-blue" onclick="confirmSymbols()">Done</button>
    </div>
  </div>
</div>

<script>
const NIFTY50 = ["NIFTY","BANKNIFTY","RELIANCE","TCS","INFY","HDFCBANK","ICICIBANK","SBIN","AXISBANK","BAJFINANCE","WIPRO","KOTAKBANK","LT","TATAMOTORS","MARUTI","HINDUNILVR","ITC","ADANIENT","SUNPHARMA","TITAN","ULTRACEMCO","NESTLEIND","POWERGRID","NTPC","ONGC"];

let GLOBAL_CONFIG = {};
let RUNNING_PIDS = {};
let activeTab = 'control';
let activeCfgTab = 'ema';
let currentModalTarget = null; // store the config key (e.g. ema_v1) being edited

function flash(msg, color='#3fb950') {
  const f = document.getElementById('flash');
  f.style.color = color; f.innerText = msg;
  setTimeout(()=>f.innerText='', 3000);
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(e => e.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  activeTab = id;
}

function switchCfgTab(type) {
  document.querySelectorAll('#cfg-tabs .tab').forEach(e => e.classList.remove('active'));
  document.querySelector(`#cfg-tabs .tab[onclick="switchCfgTab('${type}')"]`).classList.add('active');
  activeCfgTab = type;
  renderConfigTable();
}

// ── DATA FETCHING ──
async function loadAll() {
  await fetchConfig();
  await checkStatus();
  renderControlTab();
  renderPnlTab();
  renderLogTab();
  renderConfigTable();
  loadTokenStatus();
  if(activeTab === 'pnl') updatePnl();
  if(activeTab === 'log') updateLogs();
}

async function fetchConfig() {
  const r = await fetch('/api/config');
  GLOBAL_CONFIG = await r.json();
}

async function checkStatus() {
  const r = await fetch('/api/status');
  const d = await r.json();
  RUNNING_PIDS = d;
  document.getElementById('hdr-dot').className = Object.keys(d).length > 0 ? "dot on" : "dot";
}

// ── DYNAMIC RENDERING ──

function getStratColor(type) {
  if(type==='ema') return '#1f6feb';
  if(type==='rsi') return '#d29922';
  if(type==='range') return '#3fb950';
  return '#8b949e';
}

// CONTROL TAB
function renderControlTab() {
  const container = document.getElementById('control-grid');
  let html = '';
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    const pid = RUNNING_PIDS[key];
    const mode = pid ? `Running (PID ${pid})` : 'Stopped';
    html += `
      <div class="strat-card" style="border-color:${color}">
        <div class="strat-title">
          <span class="dot ${pid?'on':''}"></span>
          <span style="color:${color}">${key.toUpperCase()}</span>
        </div>
        <div class="strat-mode">${mode}</div>
        <div class="btn-row">
          <button class="btn btn-green" onclick="startBot('${key}','paper')">▶ Paper</button>
          <button class="btn btn-blue" onclick="startBot('${key}','live')">💰 Live</button>
          <button class="btn btn-red" onclick="stopBot('${key}')">⏹ Stop</button>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// P&L TAB
function renderPnlTab() {
  const statsContainer = document.getElementById('pnl-stats-grid');
  const tradesContainer = document.getElementById('pnl-trades-grid');
  let statsHtml = ''; let tradesHtml = '';
  
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    statsHtml += `
      <div class="card" style="border-color:${color}">
        <h2 style="color:${color}">${key.toUpperCase()} P&L</h2>
        <div class="stat"><span class="stat-label">Trades</span><span class="stat-value" id="${key}-trades">—</span></div>
        <div class="stat"><span class="stat-label">Wins</span><span class="stat-value green" id="${key}-wins">—</span></div>
        <div class="stat"><span class="stat-label">Losses</span><span class="stat-value red" id="${key}-losses">—</span></div>
        <div class="stat"><span class="stat-label">Net P&L</span><span class="stat-value" id="${key}-pnl">—</span></div>
      </div>
    `;
    tradesHtml += `
      <div class="card" style="border-color:${color}">
        <h2 style="color:${color}">${key.toUpperCase()} Trades</h2>
        <div id="${key}-trades-list">—</div>
      </div>
    `;
  });
  statsContainer.innerHTML = statsHtml;
  tradesContainer.innerHTML = tradesHtml;
}

// LOG TAB
const _logPaused = {};
function renderLogTab() {
  const container = document.getElementById('log-grid');
  let html = '';
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    html += `
      <div class="card" style="border-color:${color}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <h2 style="color:${color};margin:0">${key.toUpperCase()} LOG</h2>
          <button id="${key}-pause-btn" onclick="toggleLogPause('${key}')"
            style="padding:4px 12px;background:#21262d;border:1px solid #30363d;border-radius:5px;color:#e6edf3;font-size:12px;cursor:pointer">
            ⏸ Pause
          </button>
        </div>
        <div class="log-box" id="${key}-log">Loading...</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function toggleLogPause(key) {
  _logPaused[key] = !_logPaused[key];
  const btn = document.getElementById(`${key}-pause-btn`);
  if(_logPaused[key]) {
    btn.textContent = '▶ Play';
    btn.style.color = '#3fb950';
    btn.style.borderColor = '#3fb950';
  } else {
    btn.textContent = '⏸ Pause';
    btn.style.color = '#e6edf3';
    btn.style.borderColor = '#30363d';
    // scroll to bottom when resuming
    const box = document.getElementById(`${key}-log`);
    if(box) box.scrollTop = box.scrollHeight;
  }
}

// ── CONFIG TAB DYNAMIC GRID ──

const DEFAULT_CONFIGS = {
  ema: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "1m", qty: 1, active: true
  },
  rsi: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "5m",
    period: 14, oversold: 30, overbought: 70, qty: 1, max_trades_per_symbol: 2, active: true
  },
  range: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "1m",
    max_candle_size: 25, qty: 1, max_trades_per_symbol: 2,
    hawa_me_zone: false, fresh_zone_only: true, zone_exit: false, atr_exit: true, fib_exit: false, active: true
  }
};

const STRAT_FIELDS = {
  ema: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ],
  rsi: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'period', label: 'RSI Period', type: 'number'},
    {id: 'oversold', label: 'Oversold', type: 'number'},
    {id: 'overbought', label: 'Overbought', type: 'number'},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'max_trades_per_symbol', label: 'Max Trades/Symbol', type: 'number'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ],
  range: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'max_candle_size', label: 'Max Candle Size (pts)', type: 'number'},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'max_trades_per_symbol', label: 'Max Trades/Symbol', type: 'number'},
    {id: 'hawa_me_zone', label: 'Hawa Me Zone', type: 'checkbox'},
    {id: 'fresh_zone_only', label: 'Use Fresh Zone Only', type: 'checkbox'},
    {id: 'zone_exit', label: 'Zone Exit', type: 'checkbox'},
    {id: 'atr_exit', label: 'ATR Exit', type: 'checkbox'},
    {id: 'fib_exit', label: 'Fib Exit', type: 'checkbox'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ]
};

function renderConfigTable() {
  const container = document.getElementById('cfg-content');
  const type = activeCfgTab;
  const fields = STRAT_FIELDS[type];
  
  // Find variants of this type
  let variants = Object.keys(GLOBAL_CONFIG).filter(k => k.startsWith(type + '_'));
  if (variants.length === 0) {
    container.innerHTML = `<div style="color:#8b949e;padding:24px;text-align:center">No ${type.toUpperCase()} variation yet. Click "+ Add" to create one.</div><div style="padding:8px"><button class="btn btn-gray" onclick="addVariant('${type}')">+ Add ${type.toUpperCase()} Variation</button></div>`;
    return;
  }

  let html = `<div class="cfg-table-container"><table class="cfg-table">`;
  
  // Headers
  html += `<tr><th>Attributes</th>`;
  variants.forEach(v => {
    html += `<th>${v.toUpperCase()}</th>`;
  });
  html += `<th><button class="btn btn-gray" onclick="addVariant('${type}')">+ Add</button></th></tr>`;
  
  // Rows for each field
  fields.forEach(f => {
    html += `<tr><td>${f.label}</td>`;
    variants.forEach(v => {
      const val = GLOBAL_CONFIG[v][f.id] ?? '';
      
      if(f.type === 'symbols') {
        let symStr = (Array.isArray(val) ? val : []).join(', ') || 'None';
        html += `<td>
          <button class="btn btn-gray" style="font-size:11px;padding:3px 6px;margin-bottom:4px" onclick="openSymbolModal('${v}')">✏️ Select</button>
          <div style="font-size:11px;color:#8b949e;word-wrap:break-word;">${symStr}</div>
        </td>`;
      } 
      else if(f.type === 'select') {
        html += `<td><select id="cfg-${v}-${f.id}">`;
        f.opts.forEach(opt => {
          let selected = String(val) === String(opt) ? 'selected' : '';
          html += `<option value="${opt}" ${selected}>${opt}</option>`;
        });
        html += `</select></td>`;
      } 
      else if(f.type === 'number') {
        html += `<td><input type="number" id="cfg-${v}-${f.id}" value="${val}"></td>`;
      }
      else if(f.type === 'checkbox') {
        let chk = val ? 'checked' : '';
        html += `<td><input type="checkbox" id="cfg-${v}-${f.id}" ${chk}></td>`;
      }
    });
    html += `<td></td></tr>`;
  });

  // Action Row
  html += `<tr><td>Actions</td>`;
  variants.forEach(v => {
    html += `<td>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn btn-blue" style="padding:5px;" onclick="saveVariant('${v}')">💾 Save</button>
        <button class="btn btn-red" style="padding:5px;" onclick="deleteVariant('${v}')">🗑 Delete</button>
      </div>
    </td>`;
  });
  html += `<td></td></tr>`;
  
  html += `</table></div>`;
  container.innerHTML = html;
}

function addVariant(type) {
  let keys = Object.keys(GLOBAL_CONFIG).filter(k => k.startsWith(type + '_v'));
  let vNums = keys.map(k => parseInt(k.replace(type+'_v', '')) || 0);
  let nextV = (vNums.length ? Math.max(...vNums) : 0) + 1;
  
  let newCfg = JSON.parse(JSON.stringify(DEFAULT_CONFIGS[type]));
  if (keys.length > 0) {
    let baseKey = `${type}_v1`;
    if(!GLOBAL_CONFIG[baseKey]) baseKey = keys[0];
    newCfg = JSON.parse(JSON.stringify(GLOBAL_CONFIG[baseKey]));
  }
  
  GLOBAL_CONFIG[`${type}_v${nextV}`] = newCfg;
  renderConfigTable();
}

function deleteVariant(vKey) {
  if(confirm(`Are you sure you want to delete ${vKey.toUpperCase()}?`)) {
    delete GLOBAL_CONFIG[vKey];
    fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(GLOBAL_CONFIG)
    }).then(() => {
      flash(`${vKey} deleted!`);
      loadAll();
    });
  }
}

function saveVariant(vKey) {
  const type = vKey.split('_')[0];
  const fields = STRAT_FIELDS[type];
  
  fields.forEach(f => {
    if(f.type !== 'symbols') {
      let el = document.getElementById(`cfg-${vKey}-${f.id}`);
      if(el) {
        let val = el.value;
        if(f.type === 'number') val = Number(val);
        else if (f.type === 'checkbox') val = el.checked;
        if(val === 'true') val = true;
        if(val === 'false') val = false;
        GLOBAL_CONFIG[vKey][f.id] = val;
      }
    }
  });

  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(GLOBAL_CONFIG)
  }).then(async (r) => {
    let res = await r.json();
    flash(res.msg);
    loadAll();
  });
}

function openSymbolModal(vKey) {
  currentModalTarget = vKey;
  document.getElementById('modal-title').innerText = `Symbols for ${vKey.toUpperCase()}`;
  
  let currentSyms = GLOBAL_CONFIG[vKey].symbols || [];

function closeModal() {

function selectAllSymbols(state) {

function confirmSymbols() {
  if(!currentModalTarget) return;
  let selected = [];
  document.querySelectorAll('.mod-cb').forEach(cb => {

// ── PNL & LOG UPDATE LOOPS ──
async function updatePnl() {
  if (activeTab !== 'pnl') return;
  for(let key of Object.keys(GLOBAL_CONFIG)) {
    try {
      let r = await fetch(`/api/pnl?s=${key}`);
      let j = await r.json();

      const set = (id, val) => { let el = document.getElementById(id); if(el) el.innerText = val; };
      set(`${key}-trades`, j.trades ?? 0);
      set(`${key}-wins`,   j.wins   ?? 0);
      set(`${key}-losses`, j.losses ?? 0);

      let pnlEl = document.getElementById(`${key}-pnl`);
      if(pnlEl) {
        let pnl = j.total_pnl ?? 0;
        pnlEl.innerText   = '₹' + pnl.toFixed(2);
        pnlEl.className   = pnl >= 0 ? 'stat-value green' : 'stat-value red';
      }

      let tl = document.getElementById(`${key}-trades-list`);
      if(tl) {
        let details = j.details || [];
        if(!details.length) { tl.innerHTML = '<div style="color:#484f58;padding:8px">Aaj koi completed trade nahi</div>'; continue; }
        // Group by date
        let byDate = {};
        details.forEach(d => {
          let dt = (d.entry_time || '').split(' ')[0] || 'Today';
          if(!byDate[dt]) byDate[dt] = [];
          byDate[dt].push(d);
        });
        let html = '';
        Object.keys(byDate).sort().reverse().forEach(dt => {
          let dayPnl = byDate[dt].reduce((s,d)=>s+d.pnl,0);
          let dayColor = dayPnl>=0?'#3fb950':'#f85149';
          html += `<div style="margin-bottom:16px">
            <div style="color:#8b949e;font-size:11px;padding:4px 8px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between">
              <span>${dt||'Today'}</span>
              <span style="color:${dayColor};font-weight:700">${dayPnl>=0?'+':''}₹${dayPnl.toFixed(2)}</span>
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <tr style="color:#484f58;font-size:11px">
                <th style="text-align:left;padding:3px 8px">Symbol</th>
                <th style="padding:3px 8px">Side</th>
                <th style="padding:3px 8px">Entry Time</th>
                <th style="padding:3px 8px">Entry ₹</th>
                <th style="padding:3px 8px">Exit Time</th>
                <th style="padding:3px 8px">Exit ₹</th>
                <th style="padding:3px 8px">P&L</th>
              </tr>`;
          byDate[dt].forEach(d => {
            let pnlColor = d.pnl >= 0 ? '#3fb950' : '#f85149';
            let sideColor = d.entry === 'BUY' ? '#3fb950' : '#f85149';
            html += `<tr style="border-bottom:1px solid #21262d">
              <td style="padding:5px 8px;font-weight:600">${d.sym}</td>
              <td style="padding:5px 8px;color:${sideColor};text-align:center;font-weight:700">${d.entry}</td>
              <td style="padding:5px 8px;color:#8b949e;text-align:center">${d.entry_time||'—'}</td>
              <td style="padding:5px 8px;text-align:right">₹${d.entry_price.toFixed(2)}</td>
              <td style="padding:5px 8px;color:#8b949e;text-align:center">${d.exit_time||'—'}</td>
              <td style="padding:5px 8px;text-align:right">₹${d.exit_price.toFixed(2)}</td>
              <td style="padding:5px 8px;text-align:right;font-weight:700;color:${pnlColor}">${d.pnl>=0?'+':''}₹${d.pnl.toFixed(2)}</td>
            </tr>`;
          });
          html += '</table></div>';
        });
        html = html || '<div style="color:#484f58;padding:8px">Aaj koi completed trade nahi</div>';
        tl.innerHTML = html;
      }
    } catch(e){ console.error('updatePnl error', e); }
  }
}

function formatLogLine(L) {
  L = L.replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // [CONFIG] line → split into 3 readable rows
  if(L.includes('[CONFIG]')) {
    const ts = L.match(/^[\d\-]+ [\d:,]+/)?.[0] || '';
    const rest = L.replace(/^.*\[CONFIG\]\s*/, '');
    const parts = rest.split(' | ');
    // Group: line1 = TF/Instrument/Qty/MaxTrades, line2 = Entry, line3 = Exit
    const cfg   = parts.filter(p => !p.startsWith('Entry') && !p.startsWith('Exit'));
    const entry = parts.find(p => p.startsWith('Entry')) || '';
    const exit_ = parts.find(p => p.startsWith('Exit'))  || '';
    return `
      <div class="lb-dim" style="border-top:1px solid #21262d;margin-top:4px;padding-top:4px">
        <span style="color:#8b949e">${ts}</span>
        <span style="color:#58a6ff;font-weight:bold"> [CONFIG]</span>
        ${cfg.map(p=>`<span style="color:#d29922"> ${p}</span>`).join(' <span style="color:#30363d">|</span>')}
      </div>
      <div class="lb-dim" style="padding-left:16px">
        <span style="color:#3fb950">&#x2192; ENTRY:</span>
        <span style="color:#c9d1d9"> ${entry.replace('Entry: ','')}</span>
      </div>
      <div class="lb-dim" style="padding-left:16px;border-bottom:1px solid #21262d;padding-bottom:4px;margin-bottom:4px">
        <span style="color:#f85149">&#x2192; EXIT:</span>
        <span style="color:#c9d1d9"> ${exit_.replace('Exit: ','')}</span>
      </div>`;
  }

  let cls = 'lb-info';
  if(/ERROR|error|Traceback|ModuleNot|TypeError/.test(L)) cls = 'lb-err';
  else if(/WARNING|warning|Skipping stale|Failed|fail/.test(L))  cls = 'lb-warn';
  else if(/\[PAPER\].*BUY|SIGNAL.*BUY/.test(L))                  cls = 'lb-buy';
  else if(/\[PAPER\].*SELL|SIGNAL.*SELL|EXIT/.test(L))           cls = 'lb-sell';
  else if(/levels loaded|sleeping|Loop done/.test(L))             cls = 'lb-dim';
  return `<div class="${cls}">${L}</div>`;
}

async function updateLogs() {
  if (activeTab !== 'log') return;
  for(let key of Object.keys(GLOBAL_CONFIG)) {
    if(_logPaused[key]) continue;   // paused — don't update
    try {
      let r = await fetch(`/api/log?s=${key}`);
      let j = await r.json();
      let lines = (j.lines || []).slice(-120);
      let html = lines.map(formatLogLine).join('');
      let box = document.getElementById(`${key}-log`);
      if(box){ box.innerHTML = html || '<div class="lb-dim">No logs yet.</div>'; box.scrollTop = box.scrollHeight; }
    } catch(e){}
  }
}

// Token
async function loadTokenStatus(){
  try {
    let r = await fetch('/api/token');
    let j = await r.json();
    const msg = document.getElementById('token-msg');
    if(j.has_token){
      msg.style.color = '#3fb950';
      msg.innerText = `Token saved (saved at: ${j.saved_at}) — ends with ...${j.preview}`;
      document.getElementById('token-input').placeholder = 'Token already saved. Paste new one to update.';
    } else {
      msg.style.color = '#f85149';
      msg.innerText = 'No token saved yet.';
    }
  } catch(e){}
}
async function saveToken(){
  let t = document.getElementById('token-input').value.trim();
  if(!t){ flash('Token empty hai!'); return; }
  let r = await fetch('/api/token', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:t})});
  let j = await r.json();
  flash(j.msg);
  document.getElementById('token-input').value = '';
  loadTokenStatus();
}
async function checkToken(){
  let r = await fetch('/api/token_check');
  let j = await r.json();
  document.getElementById('token-msg').innerText = j.msg;
}

// ── QUICK ORDER FLOATING PANEL ───────────────────────────────────────────────
(function(){
  const LOT_SIZES = {NIFTY: 65, BANKNIFTY: 30};  // fallback; overwritten by API
  let qoSym = 'NIFTY', qoAtm = 0, qoMode = 'paper';

  // fetch real lot sizes from scrip master
  fetch('/api/lot-sizes').then(r=>r.json()).then(d=>{
    LOT_SIZES.NIFTY = d.NIFTY || 65;
    LOT_SIZES.BANKNIFTY = d.BANKNIFTY || 30;
    updateQtyHint();
  }).catch(()=>{});

  const panel = document.createElement('div');
  panel.id = 'qo-panel';
  panel.innerHTML = `
<div id="qo-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:grab">
  <span style="color:#58a6ff;font-size:12px;font-weight:bold;letter-spacing:1px">QUICK ORDER</span>
  <span id="qo-close" style="color:#8b949e;font-size:16px;cursor:pointer;line-height:1">&#x2715;</span>
</div>
<div style="display:flex;background:#0d1117;border-radius:6px;padding:2px;margin-bottom:12px;gap:2px">
  <button id="qo-paper" onclick="qoSetMode('paper')" style="flex:1;padding:5px 0;border:none;border-radius:5px;font-size:11px;font-weight:bold;cursor:pointer;background:#d29922;color:#0d1117">PAPER</button>
  <button id="qo-live"  onclick="qoSetMode('live')"  style="flex:1;padding:5px 0;border:none;border-radius:5px;font-size:11px;font-weight:bold;cursor:pointer;background:transparent;color:#8b949e">LIVE</button>
</div>
<div style="font-size:10px;color:#8b949e;margin-bottom:4px">Symbol</div>
<div style="display:flex;gap:6px;margin-bottom:10px">
  <button id="qo-sym-NIFTY"     onclick="qoSetSym('NIFTY')"     style="flex:1;padding:6px 0;border:1px solid #1f6feb;border-radius:5px;background:#1f6feb22;color:#58a6ff;font-size:12px;font-weight:bold;cursor:pointer">NIFTY</button>
  <button id="qo-sym-BANKNIFTY" onclick="qoSetSym('BANKNIFTY')" style="flex:1;padding:6px 0;border:1px solid #30363d;border-radius:5px;background:#21262d;color:#8b949e;font-size:12px;font-weight:bold;cursor:pointer">BANKNIFTY</button>
</div>
<div style="font-size:10px;color:#8b949e;margin-bottom:4px">Strike offset (ATM)</div>
<div id="qo-atm-row" style="display:flex;gap:3px;margin-bottom:10px">
  ${[-3,-2,-1,0,1,2,3].map(v=>`<button onclick="qoSetAtm(${v})" data-atm="${v}" style="flex:1;padding:4px 0;border:1px solid ${v===0?'#1f6feb':'#30363d'};border-radius:4px;background:${v===0?'#1f6feb':'#21262d'};color:${v===0?'#fff':'#8b949e'};font-size:10px;cursor:pointer">${v===0?'ATM':v>0?'+'+v:v}</button>`).join('')}
</div>
<div style="font-size:10px;color:#8b949e;margin-bottom:4px">Lots</div>
<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
  <input id="qo-lots" type="number" value="1" min="1" oninput="updateQtyHint()" style="width:54px;background:#0d1117;border:1px solid #30363d;border-radius:5px;color:#e6edf3;padding:5px 8px;font-size:13px;text-align:center;outline:none">
  <span style="font-size:11px;color:#8b949e">= <span id="qo-qty-num" style="color:#e6edf3;font-weight:bold">65</span> qty <span style="color:#444;font-size:10px">(1L=<span id="qo-ls">65</span>)</span></span>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
  <button onclick="qoOrder('BUY')"  style="padding:11px;background:#3fb950;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer">BUY</button>
  <button onclick="qoOrder('SELL')" style="padding:11px;background:#f85149;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer">SELL</button>
</div>
<div id="qo-status" style="font-size:11px;color:#8b949e;text-align:center;min-height:16px">Mode: PAPER</div>`;

  Object.assign(panel.style, {
    position:'fixed', bottom:'24px', right:'24px', width:'268px',
    background:'#161b22', border:'1px solid #30363d', borderRadius:'10px',
    padding:'14px', fontFamily:'monospace', zIndex:'9999',
    boxShadow:'0 4px 24px rgba(0,0,0,0.6)', userSelect:'none'
  });
  document.body.appendChild(panel);

  // drag
  const hdr = document.getElementById('qo-header');
  let dragging=false, dx=0, dy=0;
  hdr.addEventListener('mousedown', e=>{
    dragging=true;
    const r=panel.getBoundingClientRect();
    dx=e.clientX-r.left; dy=e.clientY-r.top;
    panel.style.right='auto';
    panel.style.bottom='auto';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    panel.style.left=(e.clientX-dx)+'px';
    panel.style.top=(e.clientY-dy)+'px';
  });
  document.addEventListener('mouseup', ()=>dragging=false);
  document.getElementById('qo-close').onclick = ()=>panel.remove();

  window.qoSetMode = m=>{
    qoMode=m;
    document.getElementById('qo-paper').style.background = m==='paper'?'#d29922':'transparent';

  };

  window.qoSetSym = s=>{
    qoSym=s;
    ['NIFTY','BANKNIFTY'].forEach(sym=>{
      const b=document.getElementById('qo-sym-'+sym);
      const sel=sym===s;
      b.style.borderColor = sel?'#1f6feb':'#30363d';
      b.style.background  = sel?'#1f6feb22':'#21262d';
      b.style.color       = sel?'#58a6ff':'#8b949e';
    });
    updateQtyHint();
  };

  window.qoSetAtm = v=>{
    qoAtm=v;

      b.style.color      = bv===v?'#fff':'#8b949e';
    });
  };

  window.updateQtyHint = ()=>{
    const ls = LOT_SIZES[qoSym]||65;
    const lots = parseInt(document.getElementById('qo-lots')?.value)||1;
    const el = document.getElementById('qo-qty-num');
    const ls2= document.getElementById('qo-ls');
    if(el) el.textContent = lots*ls;
    if(ls2) ls2.textContent = ls;
  };

  window.qoOrder = async side=>{
    const lots = parseInt(document.getElementById('qo-lots').value)||1;
    const st = document.getElementById('qo-status');
    st.textContent = 'Placing order...'; st.style.color='#d29922';
    try {
      const r = await fetch('/api/manual-order',{method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({symbol:qoSym, side, lots, strike_offset:qoAtm, mode:qoMode})});
      const j = await r.json();
      st.textContent = j.msg || (j.ok?'Done':'Error');
      st.style.color = j.ok?'#3fb950':'#f85149';
    } catch(e){ st.textContent='Network error'; st.style.color='#f85149'; }
  };
})();
</script>
