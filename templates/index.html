<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Algo Trader</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;font-size:14px}

/* ── Header ── */
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:14px 20px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:16px;font-weight:600}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
#clock{color:#8b949e;font-size:13px}
.dot{width:9px;height:9px;border-radius:50%;background:#f85149;display:inline-block;flex-shrink:0}
.dot.on{background:#3fb950;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Tabs ── */
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 20px; overflow-x:auto;}
.tab{padding:12px 18px;cursor:pointer;color:#8b949e;font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:.15s; white-space:nowrap;}
.tab:hover{color:#e6edf3}
.tab.active{color:#e6edf3;border-bottom-color:#1f6feb}
.tab-body{display:none;padding:20px}
.tab-body.active{display:block}

/* ── Cards / Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.card h2{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* ── Stat rows ── */
.stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #21262d}
.stat:last-child{border-bottom:none}
.stat-label{color:#8b949e}
.stat-value{font-weight:600}
.green{color:#3fb950}.red{color:#f85149}.yellow{color:#d29922}.blue{color:#58a6ff}

/* ── Buttons ── */
.btn{padding:9px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-green{background:#238636;color:#fff}
.btn-blue{background:#1f6feb;color:#fff}
.btn-red{background:#da3633;color:#fff}
.btn-gray{background:#21262d;color:#e6edf3;border:1px solid #30363d}
.btn-amber{background:#9e6a03;color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── Strategy card ── */
.strat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.strat-card.ema{border-color:#1f6feb}
.strat-card.rsi{border-color:#d29922}
.strat-card.range{border-color:#3fb950}
.strat-title{font-size:15px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.strat-mode{font-size:12px;color:#8b949e;margin-bottom:14px}

/* ── Log box ── */
.log-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 12px;height:320px;overflow-y:auto;font-family:monospace;font-size:11.5px;line-height:1.65}
.lb{color:#8b949e}
.lb-buy{color:#3fb950}
.lb-sell{color:#f85149}
.lb-err{color:#d29922}
.lb-scan{color:#388bfd}

/* ── Table / Grid Config ── */
.cfg-table {width:100%; border-collapse:collapse; font-size:13px; table-layout: fixed;}
.cfg-table th, .cfg-table td {border:1px solid #30363d; padding:8px; text-align:left; vertical-align:top; width: 200px;}
.cfg-table th:first-child, .cfg-table td:first-child {width: 150px; background:#161b22; font-weight:600;}
.cfg-table select, .cfg-table input {width:100%; background:#0d1117; border:1px solid #30363d; color:#e6edf3; padding:5px; border-radius:4px;}
.cfg-table-container {overflow-x:auto; background:#161b22; border:1px solid #30363d; border-radius:8px; padding:10px;}

.tag{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.tag-w{background:#1a4731;color:#3fb950}
.tag-l{background:#3d1f1f;color:#f85149}
#flash{font-size:13px;color:#8b949e;min-height:20px;padding:6px 0}

/* Modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; }
.modal { background:#161b22; border:1px solid #30363d; border-radius:8px; width:450px; max-width:90%; max-height:80vh; display:flex; flex-direction:column; }
.modal-hdr { padding:14px 18px; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; font-weight:600; font-size:15px; }
.modal-body { padding:14px 18px; overflow-y:auto; flex:1; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.modal-ftr { padding:14px 18px; border-top:1px solid #30363d; display:flex; justify-content:flex-end; gap:10px; }
.symbol-cb { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; color:#e6edf3; }
.symbol-cb input { cursor:pointer; }
.pill-container { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; padding-bottom:8px; }
.pill { background:#21262d; border:1px solid #30363d; border-radius:12px; padding:3px 10px; font-size:11px; color:#8b949e; display:flex; align-items:center; gap:6px; }
.pill .remove { cursor:pointer; color:#f85149; font-weight:bold; }
</style>
</head>
<body>

<div class="hdr">
  <span class="dot" id="hdr-dot"></span>
  <h1>Algo Trader</h1>
  <span id="hdr-badge" style="font-size:12px;color:#8b949e">—</span>
  <div class="hdr-right">
    <a href="/backtest" target="_blank" class="btn btn-gray" style="padding:6px 12px;text-decoration:none;">&#128200; Backtest</a>
    <span id="clock"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('control')">Control</div>
  <div class="tab" onclick="switchTab('pnl')">P&amp;L</div>
  <div class="tab" onclick="switchTab('log')">Logs</div>
  <div class="tab" onclick="switchTab('config')">Config</div>
</div>

<!-- CONTROL TAB -->
<div class="tab-body active" id="tab-control">
  <div class="card" style="margin-bottom:16px;border-color:#d29922">
    <h2 style="color:#d29922">Dhan Token</h2>
    <div style="display:flex;gap:10px;align-items:flex-start;margin-top:4px">
      <textarea id="token-input" placeholder="JWT token..." style="width:100%;height:60px;background:#0d1117;color:#e6edf3;padding:8px;border:1px solid #30363d;"></textarea>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-amber" onclick="saveToken()">Save</button>
        <button class="btn btn-gray"  onclick="checkToken()">Check</button>
      </div>
    </div>
    <div id="token-msg" style="font-size:12px;margin-top:6px;color:#8b949e"></div>
  </div>
  <div id="control-grid" class="grid" style="margin-bottom:12px"></div>
  <div class="btn-row">
    <button class="btn btn-gray" onclick="saveSummary()">💾 Save Today's Summary</button>
  </div>
  <div id="flash"></div>
</div>

<!-- P&L TAB -->
<div class="tab-body" id="tab-pnl">
  <div id="pnl-stats-grid" class="grid" style="margin-bottom:16px"></div>
  <div id="pnl-trades-grid" class="grid"></div>
</div>

<!-- LOG TAB -->
<div class="tab-body" id="tab-log">
  <div id="log-grid" class="grid"></div>
</div>

<!-- CONFIG TAB -->
<div class="tab-body" id="tab-config">
  <div class="tabs" style="margin-bottom:14px; background:transparent; padding:0;" id="cfg-tabs">
    <div class="tab active" onclick="switchCfgTab('ema')" style="font-size:12px;">EMA</div>
    <div class="tab" onclick="switchCfgTab('rsi')" style="font-size:12px;">RSI</div>
    <div class="tab" onclick="switchCfgTab('range')" style="font-size:12px;">Range</div>
  </div>
  
  <div id="cfg-content"></div>
</div>

<!-- MODAL FOR SYMBOLS -->
<div class="modal-overlay" id="symbol-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span id="modal-title">Select Symbols</span>
      <span style="cursor:pointer;color:#8b949e" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-cbs"></div>
    <div class="modal-ftr">
      <button class="btn btn-gray" onclick="selectAllSymbols(true)">All</button>
      <button class="btn btn-gray" onclick="selectAllSymbols(false)">Clear</button>
      <button class="btn btn-blue" onclick="confirmSymbols()">Done</button>
    </div>
  </div>
</div>

<script>
const NIFTY50 = ["NIFTY","BANKNIFTY","RELIANCE","TCS","INFY","HDFCBANK","ICICIBANK","SBIN","AXISBANK","BAJFINANCE","WIPRO","KOTAKBANK","LT","TATAMOTORS","MARUTI","HINDUNILVR","ITC","ADANIENT","SUNPHARMA","TITAN","ULTRACEMCO","NESTLEIND","POWERGRID","NTPC","ONGC"];

let GLOBAL_CONFIG = {};
let RUNNING_PIDS = {};
let activeTab = 'control';
let activeCfgTab = 'ema';
let currentModalTarget = null; // store the config key (e.g. ema_v1) being edited

function flash(msg, color='#3fb950') {
  const f = document.getElementById('flash');
  f.style.color = color; f.innerText = msg;
  setTimeout(()=>f.innerText='', 3000);
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(e => e.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${id}')"]`).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  activeTab = id;
}

function switchCfgTab(type) {
  document.querySelectorAll('#cfg-tabs .tab').forEach(e => e.classList.remove('active'));
  document.querySelector(`#cfg-tabs .tab[onclick="switchCfgTab('${type}')"]`).classList.add('active');
  activeCfgTab = type;
  renderConfigTable();
}

// ── DATA FETCHING ──
async function loadAll() {
  await fetchConfig();
  await checkStatus();
  renderControlTab();
  renderPnlTab();
  renderLogTab();
  renderConfigTable();
  if(activeTab === 'pnl') updatePnl();
  if(activeTab === 'log') updateLogs();
}

async function fetchConfig() {
  const r = await fetch('/api/config');
  GLOBAL_CONFIG = await r.json();
}

async function checkStatus() {
  const r = await fetch('/api/status');
  const d = await r.json();
  RUNNING_PIDS = d;
  document.getElementById('hdr-dot').className = Object.keys(d).length > 0 ? "dot on" : "dot";
}

// ── DYNAMIC RENDERING ──

function getStratColor(type) {
  if(type==='ema') return '#1f6feb';
  if(type==='rsi') return '#d29922';
  if(type==='range') return '#3fb950';
  return '#8b949e';
}

// CONTROL TAB
function renderControlTab() {
  const container = document.getElementById('control-grid');
  let html = '';
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    const pid = RUNNING_PIDS[key];
    const mode = pid ? `Running (PID ${pid})` : 'Stopped';
    html += `
      <div class="strat-card" style="border-color:${color}">
        <div class="strat-title">
          <span class="dot ${pid?'on':''}"></span>
          <span style="color:${color}">${key.toUpperCase()}</span>
        </div>
        <div class="strat-mode">${mode}</div>
        <div class="btn-row">
          <button class="btn btn-green" onclick="startBot('${key}','paper')">▶ Paper</button>
          <button class="btn btn-blue" onclick="startBot('${key}','live')">💰 Live</button>
          <button class="btn btn-red" onclick="stopBot('${key}')">⏹ Stop</button>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// P&L TAB
function renderPnlTab() {
  const statsContainer = document.getElementById('pnl-stats-grid');
  const tradesContainer = document.getElementById('pnl-trades-grid');
  let statsHtml = ''; let tradesHtml = '';
  
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    statsHtml += `
      <div class="card" style="border-color:${color}">
        <h2 style="color:${color}">${key.toUpperCase()} P&L</h2>
        <div class="stat"><span class="stat-label">Trades</span><span class="stat-value" id="${key}-trades">—</span></div>
        <div class="stat"><span class="stat-label">Wins</span><span class="stat-value green" id="${key}-wins">—</span></div>
        <div class="stat"><span class="stat-label">Losses</span><span class="stat-value red" id="${key}-losses">—</span></div>
        <div class="stat"><span class="stat-label">Net P&L</span><span class="stat-value" id="${key}-pnl">—</span></div>
      </div>
    `;
    tradesHtml += `
      <div class="card" style="border-color:${color}">
        <h2 style="color:${color}">${key.toUpperCase()} Trades</h2>
        <div id="${key}-trades-list">—</div>
      </div>
    `;
  });
  statsContainer.innerHTML = statsHtml;
  tradesContainer.innerHTML = tradesHtml;
}

// LOG TAB
function renderLogTab() {
  const container = document.getElementById('log-grid');
  let html = '';
  Object.keys(GLOBAL_CONFIG).forEach(key => {
    const type = key.split('_')[0];
    const color = getStratColor(type);
    html += `
      <div class="card" style="border-color:${color}">
        <h2 style="color:${color}">${key.toUpperCase()} Log</h2>
        <div class="log-box" id="${key}-log">Loading...</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

// ── CONFIG TAB DYNAMIC GRID ──

const DEFAULT_CONFIGS = {
  ema: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "1m", qty: 1, active: true
  },
  rsi: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "5m",
    period: 14, oversold: 30, overbought: 70, qty: 1, max_trades_per_symbol: 2, active: true
  },
  range: {
    symbols: ["NIFTY"], instrument: "equity", strike_offset: "0", timeframe: "1m",
    max_candle_size: 25, qty: 1, max_trades_per_symbol: 2,
    hawa_me_zone: false, fresh_zone_only: true, zone_exit: false, atr_exit: true, fib_exit: false, active: true
  }
};

const STRAT_FIELDS = {
  ema: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ],
  rsi: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'period', label: 'RSI Period', type: 'number'},
    {id: 'oversold', label: 'Oversold', type: 'number'},
    {id: 'overbought', label: 'Overbought', type: 'number'},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'max_trades_per_symbol', label: 'Max Trades/Symbol', type: 'number'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ],
  range: [
    {id: 'symbols', label: 'Symbols', type: 'symbols'},
    {id: 'instrument', label: 'Instrument', type: 'select', opts: ['equity','options']},
    {id: 'strike_offset', label: 'Strike Offset', type: 'select', opts: ['-3','-2','-1','0','1','2','3']},
    {id: 'timeframe', label: 'Timeframe', type: 'select', opts: ['1m','3m','5m','15m','30m']},
    {id: 'max_candle_size', label: 'Max Candle Size (pts)', type: 'number'},
    {id: 'qty', label: 'Quantity', type: 'number'},
    {id: 'max_trades_per_symbol', label: 'Max Trades/Symbol', type: 'number'},
    {id: 'hawa_me_zone', label: 'Hawa Me Zone', type: 'checkbox'},
    {id: 'fresh_zone_only', label: 'Use Fresh Zone Only', type: 'checkbox'},
    {id: 'zone_exit', label: 'Zone Exit', type: 'checkbox'},
    {id: 'atr_exit', label: 'ATR Exit', type: 'checkbox'},
    {id: 'fib_exit', label: 'Fib Exit', type: 'checkbox'},
    {id: 'active', label: 'Active', type: 'select', opts: ['true','false']}
  ]
};

function renderConfigTable() {
  const container = document.getElementById('cfg-content');
  const type = activeCfgTab;
  const fields = STRAT_FIELDS[type];
  
  // Find variants of this type
  let variants = Object.keys(GLOBAL_CONFIG).filter(k => k.startsWith(type + '_'));
  if (variants.length === 0) {
    GLOBAL_CONFIG[`${type}_v1`] = JSON.parse(JSON.stringify(DEFAULT_CONFIGS[type]));
    variants = [`${type}_v1`];
  }

  let html = `<div class="cfg-table-container"><table class="cfg-table">`;
  
  // Headers
  html += `<tr><th>Attributes</th>`;
  variants.forEach(v => {
    html += `<th>${v.toUpperCase()}</th>`;
  });
  html += `<th><button class="btn btn-gray" onclick="addVariant('${type}')">+ Add</button></th></tr>`;
  
  // Rows for each field
  fields.forEach(f => {
    html += `<tr><td>${f.label}</td>`;
    variants.forEach(v => {
      const val = GLOBAL_CONFIG[v][f.id] ?? '';
      
      if(f.type === 'symbols') {
        let symStr = (Array.isArray(val) ? val : []).join(', ') || 'None';
        html += `<td>
          <button class="btn btn-gray" style="font-size:11px;padding:3px 6px;margin-bottom:4px" onclick="openSymbolModal('${v}')">✏️ Select</button>
          <div style="font-size:11px;color:#8b949e;word-wrap:break-word;">${symStr}</div>
        </td>`;
      } 
      else if(f.type === 'select') {
        html += `<td><select id="cfg-${v}-${f.id}">`;
        f.opts.forEach(opt => {
          let selected = String(val) === String(opt) ? 'selected' : '';
          html += `<option value="${opt}" ${selected}>${opt}</option>`;
        });
        html += `</select></td>`;
      } 
      else if(f.type === 'number') {
        html += `<td><input type="number" id="cfg-${v}-${f.id}" value="${val}"></td>`;
      }
      else if(f.type === 'checkbox') {
        let chk = val ? 'checked' : '';
        html += `<td><input type="checkbox" id="cfg-${v}-${f.id}" ${chk}></td>`;
      }
    });
    html += `<td></td></tr>`;
  });

  // Action Row
  html += `<tr><td>Actions</td>`;
  variants.forEach(v => {
    html += `<td>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn btn-blue" style="padding:5px;" onclick="saveVariant('${v}')">💾 Save</button>
        <button class="btn btn-red" style="padding:5px;" onclick="deleteVariant('${v}')">🗑 Delete</button>
      </div>
    </td>`;
  });
  html += `<td></td></tr>`;
  
  html += `</table></div>`;
  container.innerHTML = html;
}

function addVariant(type) {
  let keys = Object.keys(GLOBAL_CONFIG).filter(k => k.startsWith(type + '_v'));
  let vNums = keys.map(k => parseInt(k.replace(type+'_v', '')) || 0);
  let nextV = (vNums.length ? Math.max(...vNums) : 0) + 1;
  
  let newCfg = JSON.parse(JSON.stringify(DEFAULT_CONFIGS[type]));
  if (keys.length > 0) {
    let baseKey = `${type}_v1`;
    if(!GLOBAL_CONFIG[baseKey]) baseKey = keys[0];
    newCfg = JSON.parse(JSON.stringify(GLOBAL_CONFIG[baseKey]));
  }
  
  GLOBAL_CONFIG[`${type}_v${nextV}`] = newCfg;
  renderConfigTable();
}

function deleteVariant(vKey) {
  if(confirm(`Are you sure you want to delete ${vKey.toUpperCase()}?`)) {
    delete GLOBAL_CONFIG[vKey];
    fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(GLOBAL_CONFIG)
    }).then(() => {
      flash(`${vKey} deleted!`);
      loadAll();
    });
  }
}

function saveVariant(vKey) {
  const type = vKey.split('_')[0];
  const fields = STRAT_FIELDS[type];
  
  fields.forEach(f => {
    if(f.type !== 'symbols') {
      let el = document.getElementById(`cfg-${vKey}-${f.id}`);
      if(el) {
        let val = el.value;
        if(f.type === 'number') val = Number(val);
        else if (f.type === 'checkbox') val = el.checked;
        if(val === 'true') val = true;
        if(val === 'false') val = false;
        GLOBAL_CONFIG[vKey][f.id] = val;
      }
    }
  });

  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(GLOBAL_CONFIG)
  }).then(async (r) => {
    let res = await r.json();
    flash(res.msg);
    loadAll();
  });
}

// ── SYMBOL MODAL ──
function openSymbolModal(vKey) {
  currentModalTarget = vKey;
  document.getElementById('modal-title').innerText = `Symbols for ${vKey.toUpperCase()}`;
  
  let currentSyms = GLOBAL_CONFIG[vKey].symbols || [];
  let html = '';
  NIFTY50.forEach(s => {
    let chk = currentSyms.includes(s) ? 'checked' : '';
    html += `<label class="symbol-cb"><input type="checkbox" value="${s}" class="mod-cb" ${chk}> ${s}</label>`;
  });
  document.getElementById('modal-cbs').innerHTML = html;
  document.getElementById('symbol-modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('symbol-modal').style.display = 'none';
  currentModalTarget = null;
}
function selectAllSymbols(state) {
  document.querySelectorAll('.mod-cb').forEach(cb => cb.checked = state);
}
function confirmSymbols() {
  if(!currentModalTarget) return;
  let selected = [];
  document.querySelectorAll('.mod-cb').forEach(cb => {
    if(cb.checked) selected.push(cb.value);
  });
  GLOBAL_CONFIG[currentModalTarget].symbols = selected;
  closeModal();
  renderConfigTable();
}

// ── BACKEND ACTIONS ──
async function startBot(s, mode) {
  let r = await fetch(`/api/start?s=${s}&mode=${mode}`, {method:'POST'});
  let j = await r.json();
  flash(j.msg, j.msg.includes('✅')?'#3fb950':'#d29922');
  checkStatus().then(renderControlTab);
}
async function stopBot(s) {
  let r = await fetch(`/api/stop?s=${s}`, {method:'POST'});
  let j = await r.json();
  flash(j.msg, '#f85149');
  checkStatus().then(renderControlTab);
}

// ── PNL & LOG UPDATE LOOPS ──
async function updatePnl() {
  if (activeTab !== 'pnl') return;
  for(let key of Object.keys(GLOBAL_CONFIG)) {
    try {
      let r = await fetch(`/api/pnl?s=${key}`);
      let j = await r.json();
      let e_tr = document.getElementById(`${key}-trades`);
      if(e_tr) {
        e_tr.innerText = j.trades;
        document.getElementById(`${key}-wins`).innerText = j.wins;
        document.getElementById(`${key}-losses`).innerText = j.losses;
        
        let pnlEl = document.getElementById(`${key}-pnl`);
        pnlEl.innerText = j.pnl.toFixed(2);
        pnlEl.className = j.pnl >= 0 ? "stat-value green" : "stat-value red";
        
        let tl = document.getElementById(`${key}-trades-list`);
        let html = '<table><tr><th>Symbol</th><th>Side</th><th>Price</th><th>Time</th></tr>';
        j.book.forEach(x => {
          let sc = x.signal.includes('BUY') ? 'lb-buy' : 'lb-sell';
          html += `<tr><td>${x.symbol}</td><td class="${sc}">${x.signal}</td><td>${x.price.toFixed(2)}</td><td style="color:#8b949e">${x.time}</td></tr>`;
        });
        html += '</table>';
        tl.innerHTML = html;
      }
    } catch(e){}
  }
}

async function updateLogs() {
  if (activeTab !== 'log') return;
  for(let key of Object.keys(GLOBAL_CONFIG)) {
    try {
      let r = await fetch(`/api/log?s=${key}`);
      let txt = await r.text();
      let lines = txt.split('\\n').filter(x => x.trim() !== '').slice(-100);
      let html = '';
      lines.forEach(L => {
        L = L.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        if(L.includes('BUY')) html += `<div class="lb-buy">${L}</div>`;
        else if(L.includes('SELL') || L.includes('EXIT')) html += `<div class="lb-sell">${L}</div>`;
        else if(L.includes('error') || L.includes('fail')) html += `<div class="lb-err">${L}</div>`;
        else if(L.includes('Scanning') || L.includes('Fetching')) html += `<div class="lb-scan">${L}</div>`;
        else html += `<div class="lb">${L}</div>`;
      });
      let box = document.getElementById(`${key}-log`);
      if(box) box.innerHTML = html;
    } catch(e){}
  }
}

// Token
async function saveToken(){
  let t = document.getElementById('token-input').value;
  let r = await fetch('/api/token', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token:t})});
  let j = await r.json();
  flash(j.msg);
}
async function checkToken(){
  let r = await fetch('/api/token_check');
  let j = await r.json();
  document.getElementById('token-msg').innerText = j.msg;
}

// ── CLOCK & LOOP ──
setInterval(()=>{
  document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-IN');
}, 1000);

setInterval(()=>{
  checkStatus();
  if(activeTab==='control') renderControlTab();
}, 5000);

setInterval(()=>{
  if(activeTab==='pnl') updatePnl();
  if(activeTab==='log') updateLogs();
}, 4000);

loadAll();
</script>
